<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🏕️ 개척 세계</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#000;overflow:hidden;touch-action:none;font-family:'Press Start 2P',monospace;}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}

/* ── Login ── */
#loginScreen{
  position:fixed;inset:0;z-index:999;
  background:radial-gradient(ellipse at 50% 60%,#2a1a08,#0a0500);
  display:flex;align-items:center;justify-content:center;
}
#loginBox{
  display:flex;flex-direction:column;align-items:center;gap:16px;
  padding:28px 22px;width:calc(100% - 32px);max-width:320px;
  background:linear-gradient(180deg,#1a0e04,#0d0700);
  border:3px solid #8a6a2a;box-shadow:inset 0 0 0 1px #c8a04044;border-radius:3px;
}
#loginTitle{
  font-size:clamp(9px,3vw,14px);color:#f0c040;
  text-shadow:0 0 12px #f0c04088,0 2px 0 #7c5010;
  text-align:center;line-height:2.2;
}
#loginTitle small{font-size:.65em;color:#c8901a;display:block;margin-top:4px;}
.ri{
  padding:12px 14px;font-size:11px;border-radius:2px;
  border:2px solid #8a6a2a;background:#080500;color:#f0e060;
  outline:none;text-align:center;width:100%;
  font-family:'Press Start 2P',monospace;
}
.ri::placeholder{color:#5a4020;font-size:9px;}
.ri:focus{border-color:#f0c040;}
#classSelect{display:flex;gap:6px;width:100%;}
.cb{
  flex:1;padding:8px 2px;font-size:7px;border-radius:2px;
  border:2px solid #5a3a10;background:#080500;color:#7a5a30;
  cursor:pointer;text-align:center;line-height:1.9;
  font-family:'Press Start 2P',monospace;
}
.cb .ci{font-size:17px;display:block;}
.cb.sel{border-color:#f0c040;color:#f0c040;background:#180e00;}
.rb{
  padding:13px 0;font-size:10px;border-radius:2px;
  border:2px solid #8a6a2a;background:linear-gradient(180deg,#3a2808,#1a1000);
  color:#f0c040;cursor:pointer;width:100%;
  font-family:'Press Start 2P',monospace;letter-spacing:2px;
  box-shadow:0 4px 0 #050200;
}
.rb:active{transform:translateY(3px);box-shadow:0 1px 0 #050200;}

/* ── Top HUD ── */
#topHud{
  position:fixed;top:0;left:0;right:0;z-index:20;
  padding:6px 8px;padding-top:calc(6px + env(safe-area-inset-top));
  display:flex;align-items:center;gap:8px;
  background:linear-gradient(180deg,rgba(0,0,0,.82),transparent);
}
#pName{font-size:8px;color:#f0c040;flex:1;text-shadow:0 0 6px #f0c04066;}
#oc{font-size:7px;color:#f0c040;}
#mm{
  width:80px;height:54px;border:2px solid #8a6a2a;
  overflow:hidden;flex-shrink:0;
}

/* ── Joystick ── */
#jWrap{
  position:fixed;bottom:22px;left:18px;
  width:120px;height:120px;border-radius:50%;
  background:rgba(10,6,0,.55);
  border:2px solid rgba(138,106,42,.45);
  display:flex;align-items:center;justify-content:center;
  z-index:15;touch-action:none;
}
#jKnob{
  width:48px;height:48px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#f0c040,#7c5010);
  border:2px solid #f0e060;pointer-events:none;
  box-shadow:0 0 12px rgba(240,192,64,.4);
}

/* ── Chat button ── */
#chatToggle{
  position:fixed;bottom:22px;right:18px;
  width:56px;height:56px;border-radius:50%;
  border:2px solid #8a6a2a;background:#0d0800;
  color:#f0c040;font-size:24px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:15;touch-action:manipulation;
  box-shadow:0 3px 0 #050200;
}
#chatToggle:active{transform:translateY(2px);box-shadow:0 1px 0 #050200;}
#chatUnread{
  position:absolute;top:-4px;right:-4px;
  width:18px;height:18px;border-radius:50%;
  background:#ee3333;color:#fff;
  font-size:8px;display:none;align-items:center;justify-content:center;
  font-family:'Press Start 2P',monospace;
}

/* ── Chat panel ── */
#chatPanel{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(8,5,0,.96);
  border-top:2px solid #8a6a2a;
  box-shadow:inset 0 1px 0 #c8a04033;
  transform:translateY(100%);transition:transform .28s ease;
  z-index:30;padding-bottom:env(safe-area-inset-bottom);
}
#chatPanel.open{transform:translateY(0);}
#chatHdr{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 14px 6px;border-bottom:1px solid #c8a04022;
}
#chatHdr span{font-size:8px;color:#f0c040;letter-spacing:1px;}
#chatX{background:none;border:none;color:#8a6a2a;font-size:20px;cursor:pointer;line-height:1;}
#chatLog{
  height:180px;overflow-y:auto;padding:8px 12px;
  display:flex;flex-direction:column;gap:4px;
  scrollbar-width:thin;scrollbar-color:#8a6a2a22 transparent;
}
#chatLog::-webkit-scrollbar{width:3px;}
#chatLog::-webkit-scrollbar-thumb{background:#8a6a2a44;}
.cm{font-size:9px;line-height:1.8;word-break:break-word;color:#c8b07a;}
.cm .sn{font-weight:700;}
.cm.sys{color:#6a5030;font-style:italic;}
#chatInputRow{display:flex;gap:6px;padding:8px 12px;}
#chatIn{
  flex:1;padding:10px 12px;border-radius:2px;font-size:10px;
  border:1px solid #8a6a2a;background:#080500;color:#f0e060;
  outline:none;font-family:'Press Start 2P',monospace;
}
#chatIn:focus{border-color:#f0c040;}
#chatSd{
  padding:10px 14px;border-radius:2px;border:1px solid #8a6a2a;
  background:#1a1000;color:#f0c040;font-size:9px;cursor:pointer;
  font-family:'Press Start 2P',monospace;
}
#chatSd:active{background:#2a1800;}

/* ── Action buttons (diamond) ── */
#actionPad{
  position:fixed;bottom:22px;right:14px;
  width:148px;height:148px;
  display:grid;
  grid-template-columns:repeat(3,46px);
  grid-template-rows:repeat(3,46px);
  gap:5px;z-index:15;
}
.actBtn{
  width:46px;height:46px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.3);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;touch-action:manipulation;user-select:none;
  font-family:'Press Start 2P',monospace;
  box-shadow:0 3px 0 rgba(0,0,0,0.5);
  transition:transform .08s,box-shadow .08s;
  gap:1px;
}
.actBtn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,0.5);}
.actBtn .bl{font-size:7px;color:rgba(255,255,255,0.9);font-weight:700;}
.actBtn .bi{font-size:15px;line-height:1;}
.actBtn.blank{background:transparent;border:none;box-shadow:none;pointer-events:none;}
/* A — 공격 (빨강) */
#btnA{background:radial-gradient(circle at 40% 35%,#ff5533,#cc1100);border-color:#ff7755;}
/* B — 스킬 (파랑) */
#btnB{background:radial-gradient(circle at 40% 35%,#4488ff,#1133cc);border-color:#66aaff;}
/* C — 상호작용 (초록) */
#btnC{background:radial-gradient(circle at 40% 35%,#44cc66,#118833);border-color:#66ee88;}
/* D — 설정가능 (노랑) */
#btnD{background:radial-gradient(circle at 40% 35%,#ffcc22,#cc8800);border-color:#ffee66;}

/* D 설정 팝업 */
#dPopup{
  position:fixed;bottom:180px;right:14px;
  background:#0d0800;border:2px solid #8a6a2a;
  box-shadow:inset 0 0 0 1px #c8a04033;
  padding:10px;border-radius:3px;z-index:40;
  display:none;flex-direction:column;gap:6px;width:160px;
}
#dPopup.open{display:flex;}
#dPopup .dp-title{font-size:7px;color:#f0c040;text-align:center;margin-bottom:4px;}
.dopt{
  padding:7px 10px;font-size:7px;border:1px solid #5a3a10;
  background:#180e00;color:#f0d888;cursor:pointer;
  font-family:'Press Start 2P',monospace;border-radius:2px;
  text-align:center;
}
.dopt:active,.dopt.selected{border-color:#f0c040;color:#f0c040;background:#2a1800;}

/* Hit flash overlay */
#hitFlash{
  position:fixed;inset:0;pointer-events:none;z-index:50;
  background:rgba(255,50,0,0);transition:background .08s;
}

/* Skill effect canvas overlay */
#fxCanvas{position:fixed;inset:0;pointer-events:none;z-index:19;}

/* ── Notif ── */
#nArea{
  position:fixed;bottom:160px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;gap:5px;
  pointer-events:none;z-index:40;
  width:calc(100% - 80px);max-width:280px;
}
.nf{
  background:#0d0800;border:2px solid #8a6a2a;
  box-shadow:inset 0 0 0 1px #c8a04033;
  color:#f0e080;padding:7px 12px;font-size:8px;line-height:1.8;
  animation:nfIn .2s ease;
}
.nf::before{content:'▶ ';color:#f0c040;}
@keyframes nfIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div id="loginBox">
    <div id="loginTitle">🏕️ 개척 세계<small>~ 황무지를 마을로 ~</small></div>
    <input class="ri" id="nameIn" type="text" placeholder="이름을 입력하시오..." maxlength="10" autocomplete="off"/>
    <div style="font-size:7px;color:#7a5a30;letter-spacing:1px;">직업 선택</div>
    <div id="classSelect">
      <div class="cb sel" data-c="warrior"><span class="ci">⚔️</span>전사</div>
      <div class="cb" data-c="mage"><span class="ci">🔮</span>마법사</div>
      <div class="cb" data-c="archer"><span class="ci">🏹</span>궁수</div>
      <div class="cb" data-c="healer"><span class="ci">✨</span>힐러</div>
    </div>
    <button class="rb" id="startBtn">▶ 개척 시작</button>
  </div>
</div>

<!-- Game canvas -->
<canvas id="gc"></canvas>

<!-- Top HUD -->
<div id="topHud">
  <div id="pName">용사</div>
  <div id="oc">👥 0명</div>
  <canvas id="mm" width="76" height="50"></canvas>
</div>

<!-- Joystick -->
<div id="jWrap"><div id="jKnob"></div></div>

<!-- Action button pad (diamond layout) -->
<div id="actionPad">
  <!-- row1 -->
  <div class="actBtn blank"></div>
  <div class="actBtn" id="btnB"><span class="bi">✨</span><span class="bl">B</span></div>
  <div class="actBtn blank"></div>
  <!-- row2 -->
  <div class="actBtn" id="btnC"><span class="bi">💬</span><span class="bl">C</span></div>
  <div class="actBtn blank"></div>
  <div class="actBtn" id="btnA"><span class="bi">⚔️</span><span class="bl">A</span></div>
  <!-- row3 -->
  <div class="actBtn blank"></div>
  <div class="actBtn" id="btnD"><span class="bi">⭐</span><span class="bl">D</span></div>
  <div class="actBtn blank"></div>
</div>

<!-- D button config popup -->
<div id="dPopup">
  <div class="dp-title">⚙ D버튼 설정</div>
  <div class="dopt selected" data-d="emote_wave">👋 손흔들기</div>
  <div class="dopt" data-d="emote_heart">❤️ 하트</div>
  <div class="dopt" data-d="emote_laugh">😂 웃음</div>
  <div class="dopt" data-d="emote_angry">😡 화남</div>
  <div class="dopt" data-d="sprint">💨 달리기</div>
</div>

<!-- Hit flash -->
<div id="hitFlash"></div>

<!-- FX canvas for skills -->
<canvas id="fxCanvas"></canvas>
<div id="chatToggle">
  💬
  <div id="chatUnread">0</div>
</div>

<!-- Chat panel -->
<div id="chatPanel">
  <div id="chatHdr">
    <span>💬 마을 채팅</span>
    <button id="chatX">✕</button>
  </div>
  <div id="chatLog"></div>
  <div id="chatInputRow">
    <input id="chatIn" type="text" placeholder="메시지 입력..." maxlength="30" autocomplete="off"/>
    <button id="chatSd">전송</button>
  </div>
</div>

<div id="nArea"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
// ═══════════════════════════════════
//  Firebase
// ═══════════════════════════════════
const FB={
  apiKey:"AIzaSyDy-J4d37ucBO36-mfJbtpBRxNLcRusNr8",
  authDomain:"game-test-001-57821.firebaseapp.com",
  databaseURL:"https://game-test-001-57821-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"game-test-001-57821",
  storageBucket:"game-test-001-57821.firebasestorage.app",
  messagingSenderId:"795750968042",
  appId:"1:795750968042:web:52026a20a4ad831efa8593"
};

// ═══════════════════════════════════
//  Constants
// ═══════════════════════════════════
const TS=48, MW=150, MH=120;
const DIR={DOWN:0,UP:1,LEFT:2,RIGHT:3};

const CLS_C={warrior:'#e04428',mage:'#8844ee',archer:'#22aa44',healer:'#ddaa00'};
const CLS_I={warrior:'⚔️',mage:'🔮',archer:'🏹',healer:'✨'};

// ═══════════════════════════════════
//  State
// ═══════════════════════════════════
let db,myId,myName,myColor,myClass='warrior';
let players={};
let myPos={x:0,y:0},myDir=DIR.DOWN,myWalkFrame=0;
let cam={x:0,y:0};
let lastSync=0,walkTick=0;
const held={up:false,down:false,left:false,right:false};

// Speech bubbles: {playerId: {msg, expire}}
const bubbles={};
const BUBBLE_DURATION=4000; // ms

// Unread count
let chatOpen=false,unreadCount=0;

// ═══════════════════════════════════
//  Canvas
// ═══════════════════════════════════
const gc=document.getElementById('gc');
const ctx=gc.getContext('2d');
const mmEl=document.getElementById('mm');
const mm=mmEl.getContext('2d');
function resize(){gc.width=window.innerWidth;gc.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

// ═══════════════════════════════════
//  Procedural map (황무지 base)
// ═══════════════════════════════════
let decorMap=[];
function genDecor(){
  decorMap=[];
  for(let y=0;y<MH;y++){
    decorMap[y]=[];
    for(let x=0;x<MW;x++){
      const n=(Math.sin(x*.37+y*.19)*Math.cos(x*.13-y*.41)+1)*.5;
      decorMap[y][x]=n>.83?1:0; // 1=rock decoration
    }
  }
}

// ═══════════════════════════════════
//  Tile drawing (황무지 only for now)
// ═══════════════════════════════════
function drawGround(x,y,px,py){
  const s=(x*73856+y*49381)&0xffff;
  const S=TS;
  // Base dirt color variation
  const cols=['#8a6a3a','#7a5a2a','#9a7a4a','#856535'];
  ctx.fillStyle=cols[s%4];
  ctx.fillRect(px,py,S,S);

  // Crack lines
  ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;
  if(s%5===0){
    ctx.beginPath();ctx.moveTo(px+4+s%8,py+6);ctx.lineTo(px+14+s%6,py+22);ctx.lineTo(px+8,py+32);ctx.stroke();
  }else if(s%5===1){
    ctx.beginPath();ctx.moveTo(px+26+s%8,py+4);ctx.lineTo(px+18+s%4,py+20);ctx.lineTo(px+28,py+36);ctx.stroke();
  }else if(s%5===2){
    ctx.beginPath();ctx.moveTo(px+8,py+28);ctx.lineTo(px+22,py+40);ctx.stroke();
  }

  // Rocks (decorative)
  if(decorMap[y]&&decorMap[y][x]===1){
    ctx.fillStyle='#6a6a6a';
    ctx.beginPath();ctx.ellipse(px+s%26+8,py+s%22+8,5+s%4,4+s%3,s*.1,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#8a8a8a';
    ctx.beginPath();ctx.ellipse(px+s%26+6,py+s%22+6,3,2,s*.1,0,Math.PI*2);ctx.fill();
  }

  // Sparse dead grass tufts
  if(s%7===0){
    ctx.fillStyle='#6a5520';
    ctx.fillRect(px+s%30+4,py+s%28+10,2,7);
    ctx.fillRect(px+s%30+7,py+s%28+12,2,5);
  }
}

// ═══════════════════════════════════
//  Character sprite (4-direction)
// ═══════════════════════════════════
function drawCharSprite(cx,cy,color,job,dir,frame,isMe){
  const f=frame;
  const hc={warrior:'#cc2200',mage:'#4400cc',archer:'#006622',healer:'#cc8800'};
  const hair=hc[job]||'#333';
  const skin='#f0c890';

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();ctx.ellipse(cx,cy+16,10,4,0,0,Math.PI*2);ctx.fill();

  if(dir===DIR.DOWN){
    // Legs
    ctx.fillStyle='#223366';
    if(f===0){ctx.fillRect(cx-5,cy+4,4,10);ctx.fillRect(cx+1,cy+4,4,10);}
    else{ctx.fillRect(cx-5,cy+6,4,8);ctx.fillRect(cx+1,cy+2,4,10);}
    // Body
    ctx.fillStyle=color;ctx.fillRect(cx-7,cy-6,14,12);
    // Arms
    if(f===0){ctx.fillRect(cx-11,cy-5,4,9);ctx.fillRect(cx+7,cy-5,4,9);}
    else{ctx.fillRect(cx-11,cy-3,4,9);ctx.fillRect(cx+7,cy-7,4,9);}
    // Head
    ctx.fillStyle=skin;ctx.fillRect(cx-6,cy-18,12,12);
    // Eyes
    ctx.fillStyle='#111';ctx.fillRect(cx-3,cy-14,2,2);ctx.fillRect(cx+1,cy-14,2,2);
    // Mouth
    ctx.fillStyle='#cc7777';ctx.fillRect(cx-2,cy-11,5,1);
    // Hair
    ctx.fillStyle=hair;ctx.fillRect(cx-6,cy-20,12,5);
    ctx.fillRect(cx-7,cy-18,2,7);ctx.fillRect(cx+5,cy-18,2,7);

  } else if(dir===DIR.UP){
    // Legs
    ctx.fillStyle='#223366';
    if(f===0){ctx.fillRect(cx-5,cy+4,4,10);ctx.fillRect(cx+1,cy+4,4,10);}
    else{ctx.fillRect(cx-5,cy+2,4,10);ctx.fillRect(cx+1,cy+6,4,8);}
    // Body
    ctx.fillStyle=color;ctx.fillRect(cx-7,cy-6,14,12);
    // Arms
    if(f===0){ctx.fillRect(cx-11,cy-5,4,9);ctx.fillRect(cx+7,cy-5,4,9);}
    else{ctx.fillRect(cx-11,cy-7,4,9);ctx.fillRect(cx+7,cy-3,4,9);}
    // Head (back)
    ctx.fillStyle=skin;ctx.fillRect(cx-6,cy-18,12,12);
    // Hair (more visible)
    ctx.fillStyle=hair;ctx.fillRect(cx-6,cy-20,12,6);
    ctx.fillRect(cx-7,cy-18,2,9);ctx.fillRect(cx+5,cy-18,2,9);
    ctx.fillRect(cx-6,cy-12,12,2);

  } else if(dir===DIR.LEFT){
    // Legs
    ctx.fillStyle='#223366';
    if(f===0){ctx.fillRect(cx-5,cy+4,9,10);}
    else{ctx.fillRect(cx-6,cy+3,5,10);ctx.fillRect(cx-1,cy+7,5,7);}
    // Body
    ctx.fillStyle=color;ctx.fillRect(cx-7,cy-6,13,12);
    // Arm (back)
    if(f===0)ctx.fillRect(cx+4,cy-5,4,9);
    else ctx.fillRect(cx+4,cy-8,4,9);
    // Head
    ctx.fillStyle=skin;ctx.fillRect(cx-7,cy-18,11,12);
    // Eye
    ctx.fillStyle='#111';ctx.fillRect(cx-4,cy-14,2,2);
    // Nose
    ctx.fillStyle='#d0a870';ctx.fillRect(cx-7,cy-13,2,2);
    // Hair
    ctx.fillStyle=hair;ctx.fillRect(cx-7,cy-20,11,5);
    ctx.fillRect(cx-8,cy-18,2,9);

  } else { // RIGHT
    // Legs
    ctx.fillStyle='#223366';
    if(f===0){ctx.fillRect(cx-4,cy+4,9,10);}
    else{ctx.fillRect(cx-4,cy+7,5,7);ctx.fillRect(cx+1,cy+3,5,10);}
    // Body
    ctx.fillStyle=color;ctx.fillRect(cx-6,cy-6,13,12);
    // Arm (back)
    if(f===0)ctx.fillRect(cx-8,cy-5,4,9);
    else ctx.fillRect(cx-8,cy-8,4,9);
    // Head
    ctx.fillStyle=skin;ctx.fillRect(cx-4,cy-18,11,12);
    // Eye
    ctx.fillStyle='#111';ctx.fillRect(cx+2,cy-14,2,2);
    // Nose
    ctx.fillStyle='#d0a870';ctx.fillRect(cx+5,cy-13,2,2);
    // Hair
    ctx.fillStyle=hair;ctx.fillRect(cx-4,cy-20,11,5);
    ctx.fillRect(cx+6,cy-18,2,9);
  }

  // Weapon
  if(job==='warrior'){
    const wx=dir===DIR.RIGHT?cx+9:cx-11;
    ctx.fillStyle='#ccccee';ctx.fillRect(wx,cy-14,2,20);
    ctx.fillStyle='#aa8833';ctx.fillRect(wx-2,cy-6,6,3);
  }else if(job==='mage'){
    const wx=dir===DIR.RIGHT?cx+9:cx-11;
    ctx.fillStyle='#8866cc';ctx.fillRect(wx,cy-18,2,22);
    ctx.fillStyle='#ffcc00';ctx.fillRect(wx-2,cy-20,6,6);
    const t2=Date.now();
    ctx.fillStyle='rgba(180,120,255,.8)';
    ctx.fillRect(wx+Math.cos(t2*.007)*3,cy-23+Math.sin(t2*.007)*3,3,3);
  }else if(job==='archer'){
    const wx=dir===DIR.RIGHT?cx+9:cx-11;
    ctx.strokeStyle='#886633';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(wx+1,cy-4,8,-.8,.8);ctx.stroke();
    ctx.strokeStyle='#ccaa66';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(wx+1,cy-11);ctx.lineTo(wx+1,cy+3);ctx.stroke();
  }

  // Crown (self)
  if(isMe){
    ctx.fillStyle='rgba(240,192,64,.9)';
    ctx.fillRect(cx-8,cy-24,16,3);
    ctx.fillRect(cx-6,cy-26,3,3);ctx.fillRect(cx-1,cy-26,3,3);ctx.fillRect(cx+4,cy-26,3,3);
  }
}

// ═══════════════════════════════════
//  Speech bubble
// ═══════════════════════════════════
function drawBubble(cx,cy,msg,color){
  ctx.font='bold 9px "Press Start 2P",monospace';
  const maxW=140;
  // Word wrap
  const words=msg.split('');
  const lines=[];
  let cur='';
  for(const ch of words){
    const test=cur+ch;
    if(ctx.measureText(test).width>maxW-16){lines.push(cur);cur=ch;}
    else cur=test;
  }
  if(cur)lines.push(cur);

  const lh=14,pad=7;
  const bw=Math.max(...lines.map(l=>ctx.measureText(l).width))+pad*2;
  const bh=lines.length*lh+pad*2;
  const bx=cx-bw/2, by=cy-28-bh;

  // Bubble background
  ctx.fillStyle='rgba(255,255,240,0.97)';
  ctx.beginPath();
  ctx.roundRect(bx,by,bw,bh,5);
  ctx.fill();

  // Border (class color)
  ctx.strokeStyle=color||'#8a6a2a';ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(bx,by,bw,bh,5);ctx.stroke();

  // Tail
  ctx.fillStyle='rgba(255,255,240,0.97)';
  ctx.beginPath();ctx.moveTo(cx-5,by+bh);ctx.lineTo(cx+5,by+bh);ctx.lineTo(cx,by+bh+8);ctx.fill();
  ctx.strokeStyle=color||'#8a6a2a';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(cx-5,by+bh+1);ctx.lineTo(cx,by+bh+8);ctx.lineTo(cx+5,by+bh+1);ctx.stroke();

  // Text
  ctx.fillStyle='#2a1a00';ctx.textAlign='center';ctx.textBaseline='top';
  lines.forEach((l,i)=>ctx.fillText(l,cx,by+pad+i*lh));
}

// ═══════════════════════════════════
//  Minimap
// ═══════════════════════════════════
function drawMinimap(){
  const mw=76,mh=50,sx=mw/MW,sy=mh/MH;
  mm.fillStyle='#6a4a1a';mm.fillRect(0,0,mw,mh);
  // Viewport rect
  mm.strokeStyle='rgba(240,192,64,.6)';mm.lineWidth=1;
  mm.strokeRect(cam.x/TS*sx,cam.y/TS*sy,gc.width/TS*sx,gc.height/TS*sy);
  // Players
  const now=Date.now();
  Object.entries(players).forEach(([id,p])=>{
    if(!p)return;if(id!==myId&&p.lastSeen&&now-p.lastSeen>12000)return;
    mm.fillStyle=p.color||'#fff';
    mm.fillRect(p.x/TS*sx-1,p.y/TS*sy-1,3,3);
  });
  // Self
  mm.fillStyle='#f0c040';
  mm.fillRect(myPos.x/TS*sx-2,myPos.y/TS*sy-2,4,4);
}

// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);
    this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();
  };
}

// ═══════════════════════════════════
//  Joystick (4-direction snap)
// ═══════════════════════════════════
const jWrap=document.getElementById('jWrap');
const jKnob=document.getElementById('jKnob');
const JR=44;
let jTouchId=null;

jWrap.addEventListener('touchstart',e=>{
  e.preventDefault();e.stopPropagation();
  if(jTouchId!==null)return;
  const t=e.changedTouches[0];jTouchId=t.identifier;
  const r=jWrap.getBoundingClientRect();
  handleJoy(t.clientX-(r.left+r.width/2),t.clientY-(r.top+r.height/2));
},{passive:false});
jWrap.addEventListener('touchmove',e=>{
  e.preventDefault();e.stopPropagation();
  for(const t of e.changedTouches){
    if(t.identifier!==jTouchId)continue;
    const r=jWrap.getBoundingClientRect();
    handleJoy(t.clientX-(r.left+r.width/2),t.clientY-(r.top+r.height/2));
  }
},{passive:false});
function jRelease(){
  jTouchId=null;
  held.up=held.down=held.left=held.right=false;
  jKnob.style.transform='translate(0,0)';
}
jWrap.addEventListener('touchend',e=>{
  e.preventDefault();e.stopPropagation();
  for(const t of e.changedTouches){if(t.identifier===jTouchId)jRelease();}
},{passive:false});
jWrap.addEventListener('touchcancel',e=>{jRelease();},{passive:false});

function handleJoy(dx,dy){
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<12){
    held.up=held.down=held.left=held.right=false;
    jKnob.style.transform='translate(0,0)';return;
  }
  const cd=Math.min(dist,JR),ang=Math.atan2(dy,dx);
  jKnob.style.transform=`translate(${Math.cos(ang)*cd}px,${Math.sin(ang)*cd}px)`;
  held.up=false;held.down=false;held.left=false;held.right=false;
  const deg=ang*(180/Math.PI);
  if(deg>=-45&&deg<45)       held.right=true;
  else if(deg>=45&&deg<135)  held.down=true;
  else if(deg>=-135&&deg<-45)held.up=true;
  else                        held.left=true;
}

// ═══════════════════════════════════
//  Movement
// ═══════════════════════════════════
const SPD=2.8;
function updateMove(){
  if(!myId)return;
  const speed=sprintActive?SPD*1.9:SPD;
  let dx=0,dy=0;
  if(held.up){dy=-speed;myDir=DIR.UP;}
  else if(held.down){dy=speed;myDir=DIR.DOWN;}
  else if(held.left){dx=-speed;myDir=DIR.LEFT;}
  else if(held.right){dx=speed;myDir=DIR.RIGHT;}

  if(dx!==0||dy!==0){
    walkTick++;
    myWalkFrame=Math.floor(walkTick/10)%2;
    const nx=clamp(myPos.x+dx,0,MW*TS-1);
    const ny=clamp(myPos.y+dy,0,MH*TS-1);
    myPos.x=nx;myPos.y=ny;
    syncPos();
  }else{
    myWalkFrame=0;walkTick=0;
  }
}

function updateCam(){
  const tx=myPos.x-gc.width/2,ty=myPos.y-gc.height/2;
  cam.x+=(tx-cam.x)*.12;cam.y+=(ty-cam.y)*.12;
  cam.x=clamp(cam.x,0,Math.max(0,MW*TS-gc.width));
  cam.y=clamp(cam.y,0,Math.max(0,MH*TS-gc.height));
}

function drawWorld(){
  const sx=Math.floor(cam.x/TS),sy=Math.floor(cam.y/TS);
  const ex=Math.min(MW,sx+Math.ceil(gc.width/TS)+2);
  const ey=Math.min(MH,sy+Math.ceil(gc.height/TS)+2);
  for(let y=sy;y<ey;y++)
    for(let x=sx;x<ex;x++)
      drawGround(x,y,x*TS-cam.x,y*TS-cam.y);
}

function drawAllPlayers(now){
  const list=[];
  Object.entries(players).forEach(([id,p])=>{
    if(!p)return;
    if(id!==myId&&p.lastSeen&&now-p.lastSeen>12000)return;
    list.push({...p,id,isMe:id===myId});
  });
  // Self (use real-time pos)
  // Replace self in list with current pos
  const selfIdx=list.findIndex(p=>p.isMe);
  if(selfIdx>=0){list[selfIdx].x=myPos.x;list[selfIdx].y=myPos.y;list[selfIdx].dir=myDir;}
  else list.push({x:myPos.x,y:myPos.y,name:myName,color:myColor,jobClass:myClass,dir:myDir,id:myId,isMe:true});

  // Sort by Y for depth
  list.sort((a,b)=>a.y-b.y);

  list.forEach(p=>{
    const sx=p.x-cam.x,sy=p.y-cam.y;
    if(sx<-80||sy<-100||sx>gc.width+80||sy>gc.height+100)return;
    const frame=p.isMe?myWalkFrame:Math.floor(now/240+p.x*.01)%2;
    const dir=p.isMe?myDir:(p.dir||DIR.DOWN);

    drawCharSprite(sx+TS/2,sy+TS/2,p.color||'#e04428',p.jobClass||'warrior',dir,frame,p.isMe);

    // Name tag
    const nameStr=p.name+(p.isMe?' ★':'');
    ctx.font='bold 8px "Press Start 2P",monospace';
    const tw=ctx.measureText(nameStr).width;
    ctx.fillStyle='rgba(8,5,0,.85)';
    ctx.fillRect(sx+TS/2-tw/2-6,sy+TS/2-36,tw+12,12);
    ctx.strokeStyle=p.isMe?'#f0c040':'#8a6a2a';ctx.lineWidth=1;
    ctx.strokeRect(sx+TS/2-tw/2-6,sy+TS/2-36,tw+12,12);
    ctx.fillStyle=p.isMe?'#f0c040':'#f0d888';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(nameStr,sx+TS/2,sy+TS/2-35);

    // Speech bubble
    const bubble=bubbles[p.id];
    if(bubble&&now<bubble.expire){
      drawBubble(sx+TS/2,sy+TS/2-38,bubble.msg,bubble.color||p.color);
    }
  });
}

// ═══════════════════════════════════
//  FX Canvas
// ═══════════════════════════════════
const fxC=document.getElementById('fxCanvas');
const fxCtx=fxC.getContext('2d');
fxC.width=window.innerWidth;fxC.height=window.innerHeight;
window.addEventListener('resize',()=>{fxC.width=window.innerWidth;fxC.height=window.innerHeight;});
let fxParticles=[];

function addParticles(x,y,color,count,type){
  for(let i=0;i<count;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=type==='skill'?2+Math.random()*4:1.5+Math.random()*3;
    fxParticles.push({
      x,y,
      vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
      life:1,decay:0.02+Math.random()*0.03,
      size:type==='skill'?6+Math.random()*8:4+Math.random()*5,
      color,type
    });
  }
}

function updateFX(){
  fxCtx.clearRect(0,0,fxC.width,fxC.height);
  fxParticles=fxParticles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;
    p.life-=p.decay;if(p.life<=0)return false;
    fxCtx.save();
    fxCtx.globalAlpha=p.life;
    fxCtx.fillStyle=p.color;
    if(p.type==='skill'){
      fxCtx.font=`${p.size*2}px serif`;
      fxCtx.textAlign='center';fxCtx.textBaseline='middle';
      fxCtx.fillText(p.emoji||'✨',p.x,p.y);
    }else{
      fxCtx.beginPath();fxCtx.arc(p.x,p.y,p.size,0,Math.PI*2);fxCtx.fill();
    }
    fxCtx.restore();
    return true;
  });
}

// ═══════════════════════════════════
//  Get entity in front of player
// ═══════════════════════════════════
function getEntityInFront(){
  const range=TS*1.5;
  let fx=myPos.x, fy=myPos.y;
  if(myDir===DIR.UP)    fy-=TS;
  else if(myDir===DIR.DOWN) fy+=TS;
  else if(myDir===DIR.LEFT) fx-=TS;
  else fx+=TS;

  // Find closest player in front direction
  let closest=null, closestDist=range;
  const now=Date.now();
  Object.entries(players).forEach(([id,p])=>{
    if(!p||id===myId)return;
    if(p.lastSeen&&now-p.lastSeen>12000)return;
    const dist=Math.sqrt((p.x-fx)**2+(p.y-fy)**2);
    if(dist<closestDist){closestDist=dist;closest={...p,id};}
  });
  return closest;
}

// Screen coords of my character
function myScreenPos(){
  return {
    x:myPos.x-cam.x+TS/2,
    y:myPos.y-cam.y+TS/2
  };
}

  // Attack visual: slash particles
  const slashColor={warrior:'#ffaaaa',mage:'#aaaaff',archer:'#aaffaa',healer:'#ffffaa'}[myClass]||'#fff';
  addParticles(sp.x,sp.y-10,slashColor,12,'attack');

  setTimeout(()=>flash.style.background='rgba(255,50,0,0)',150);

  if(target){
    // Attack target particle at their screen pos
    const tx=target.x-cam.x+TS/2, ty=target.y-cam.y+TS/2;
    addParticles(tx,ty,'#ff4444',16,'attack');
    notif('⚔️ '+target.name+' 을(를) 공격했다!');

function doInteract(){

  if(!target){notif('🔍 주변에 아무도 없다...');return;}

  // Show greeting bubble to target

  notif('💬 '+target.name+' 에게 인사했다!');

  const sp=myScreenPos();
  for(let i=0;i<8;i++){
    fxParticles.push({
      x:sp.x+(Math.random()-0.5)*40,y:sp.y-10,
      vx:(Math.random()-0.5)*2,vy:-2-Math.random()*2,
      life:1,decay:0.02,size:10,color:'#ff88aa',type:'skill',emoji:'💕'
    });
  }
}

// ═══════════════════════════════════
//  D — User configurable
// ═══════════════════════════════════
let dConfig='emote_wave';
const D_EMOTES={
  emote_wave: {msg:'👋 손을 흔들었다!',   emoji:'👋', bubble:'(손을 흔든다)'},
  emote_heart:{msg:'❤️ 하트를 보냈다!',   emoji:'❤️', bubble:'(하트~)'},
  emote_laugh:{msg:'😂 웃었다!',           emoji:'😂', bubble:'ㅋㅋㅋ'},
  emote_angry:{msg:'😡 화를 냈다!',        emoji:'😡', bubble:'...!'},
  sprint:     {msg:'💨 전력질주!',         emoji:null,  bubble:null},
};
let sprintActive=false;

function doD(){
  const conf=D_EMOTES[dConfig];
  if(!conf)return;

  if(dConfig==='sprint'){
    sprintActive=true;
    notif('💨 달리기!');
    setTimeout(()=>{sprintActive=false;},3000);
    return;
  }

  // Emote
  const sp=myScreenPos();
  if(conf.emoji){
    for(let i=0;i<10;i++){
      fxParticles.push({
        x:sp.x+(Math.random()-0.5)*30,y:sp.y-10,
        vx:(Math.random()-0.5)*1.5,vy:-1.5-Math.random()*2,
        life:1,decay:0.018,size:12,color:'#fff',type:'skill',emoji:conf.emoji
      });
    }
  }
  if(conf.bubble){
    bubbles[myId]={msg:conf.bubble,color:myColor,expire:Date.now()+3000};
    if(db) db.ref('chat').push({name:myName,color:myColor,jobClass:myClass,msg:conf.bubble,pid:myId,t:Date.now()});
  }
  notif(conf.msg);
}

// D config popup
let dPopupOpen=false;
document.getElementById('btnD').addEventListener('touchstart',e=>{
  e.preventDefault();e.stopPropagation();
},{passive:false});
document.getElementById('btnD').addEventListener('click',()=>{
  dPopupOpen=!dPopupOpen;
  document.getElementById('dPopup').classList.toggle('open',dPopupOpen);
});
document.querySelectorAll('.dopt').forEach(opt=>{
  opt.addEventListener('click',e=>{
    e.stopPropagation();
    document.querySelectorAll('.dopt').forEach(o=>o.classList.remove('selected'));
    opt.classList.add('selected');
    dConfig=opt.dataset.d;
    // Update D button icon
    const icons={emote_wave:'👋',emote_heart:'❤️',emote_laugh:'😂',emote_angry:'😡',sprint:'💨'};
    document.querySelector('#btnD .bi').textContent=icons[dConfig]||'⭐';
    dPopupOpen=false;document.getElementById('dPopup').classList.remove('open');
    notif('D버튼 → '+opt.textContent+' 로 설정됨');
    doD(); // fire immediately
  });
});
// Close popup on outside tap
document.addEventListener('click',()=>{
  if(dPopupOpen){dPopupOpen=false;document.getElementById('dPopup').classList.remove('open');}
});

// Button listeners
document.getElementById('btnA').addEventListener('click',doAttack);
document.getElementById('btnB').addEventListener('click',doSkill);
document.getElementById('btnC').addEventListener('click',doInteract);

// Listen for incoming attacks
function listenEvents(){
  if(!db)return;
  db.ref('events').limitToLast(1).on('child_added',s=>{
    const ev=s.val();if(!ev)return;
    if(ev.to===myId&&ev.type==='attack'){
      // Got hit!
      const flash=document.getElementById('hitFlash');
      flash.style.background='rgba(255,0,0,0.35)';
      setTimeout(()=>flash.style.background='rgba(255,50,0,0)',200);
      const attacker=players[ev.from];
      if(attacker) notif('💥 '+attacker.name+' 에게 공격당했다!');
    }
  });
}

// ═══════════════════════════════════
//  Main loop
// ═══════════════════════════════════
function loop(){
  const now=Date.now();
  updateMove();updateCam();

  // Background (horizon sky)
  ctx.fillStyle='#c8a86a';ctx.fillRect(0,0,gc.width,gc.height);

  drawWorld();
  drawAllPlayers(now);

  // Vignette
  const vg=ctx.createRadialGradient(gc.width/2,gc.height/2,gc.height*.2,gc.width/2,gc.height/2,gc.height*.88);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.32)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,gc.width,gc.height);

  drawMinimap();
  updateFX();
  requestAnimationFrame(loop);
}

setInterval(()=>{if(db&&myId)db.ref('players/'+myId+'/lastSeen').set(Date.now());},4000);
</script>
