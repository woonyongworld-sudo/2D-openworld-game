*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#000;overflow:hidden;font-family:'Press Start 2P',monospace;touch-action:none;image-rendering:pixelated;}
canvas{display:block;image-rendering:pixelated;}
.rpg-win{background:linear-gradient(180deg,#1a1040,#0d0820);border:3px solid #7c5f1a;box-shadow:inset 0 0 0 1px #f0c04055,0 0 16px #00000099;border-radius:3px;}
#loginScreen{position:fixed;inset:0;z-index:999;background:radial-gradient(ellipse at center,#1a0a2e,#000);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;overflow:hidden;}
#loginBox{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:18px;padding:28px 24px;width:calc(100% - 32px);max-width:340px;}
#loginTitle{font-size:clamp(10px,3.5vw,17px);color:#f0c040;text-shadow:0 0 20px #f0c04088,0 2px 0 #7c5f1a;text-align:center;line-height:2.2;letter-spacing:2px;}
#loginTitle span{font-size:0.7em;color:#c8a030;display:block;margin-top:4px;}
#loginStar{font-size:32px;animation:spin 8s linear infinite;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.rpg-input{padding:14px 16px;font-size:12px;border-radius:2px;border:2px solid #7c5f1a;background:#0a0518;color:#f0e080;outline:none;text-align:center;width:100%;font-family:'Press Start 2P',monospace;box-shadow:inset 0 0 0 1px #f0c04033;}
.rpg-input::placeholder{color:#554433;font-size:9px;}
.rpg-input:focus{border-color:#f0c040;}
.rpg-btn{padding:14px 0;font-size:11px;border-radius:2px;border:2px solid #7c5f1a;background:linear-gradient(180deg,#3a2a08,#1a1004);color:#f0c040;cursor:pointer;width:100%;font-family:'Press Start 2P',monospace;letter-spacing:2px;box-shadow:0 4px 0 #0a0806;}
.rpg-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #0a0806;}
#classSelect{display:flex;gap:8px;width:100%;}
.class-btn{flex:1;padding:8px 4px;font-size:7px;border-radius:2px;border:2px solid #443322;background:#0a0518;color:#887755;cursor:pointer;text-align:center;line-height:1.8;font-family:'Press Start 2P',monospace;}
.class-btn .ci{font-size:20px;display:block;margin-bottom:3px;}
.class-btn.selected{border-color:#f0c040;color:#f0c040;background:#1a1004;}
#topHud{position:fixed;top:0;left:0;right:0;padding:6px 8px;padding-top:calc(6px + env(safe-area-inset-top));display:flex;align-items:center;gap:6px;z-index:20;background:linear-gradient(180deg,rgba(0,0,0,0.9),transparent);}
#playerStatus{flex:1;}
#playerNameHud{font-size:7px;color:#f0c040;margin-bottom:3px;}
#hpBar{height:6px;background:#220000;border:1px solid #550000;overflow:hidden;}
#hpFill{height:100%;background:linear-gradient(90deg,#cc0000,#ff4444);width:100%;}
#mpBar{height:4px;background:#000022;border:1px solid #000055;overflow:hidden;margin-top:2px;}
#mpFill{height:100%;background:linear-gradient(90deg,#0000cc,#4444ff);width:100%;}
#minimap{width:80px;height:54px;border-radius:2px;border:2px solid #7c5f1a;overflow:hidden;flex-shrink:0;}
#minimapCanvas{display:block;}
#onlineBadge{font-size:7px;color:#f0c040;padding:4px 6px;flex-shrink:0;}
#menuBtn{width:32px;height:32px;border-radius:2px;border:2px solid #7c5f1a;background:#0a0518;color:#f0c040;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
#joystickWrap{position:fixed;bottom:20px;left:16px;width:110px;height:110px;border-radius:50%;background:rgba(0,0,0,0.55);border:2px solid rgba(240,192,64,0.25);display:flex;align-items:center;justify-content:center;touch-action:none;z-index:15;}
#joystickKnob{width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#f0c040,#7c5f1a);border:2px solid #f0e080;pointer-events:none;}
#toolbar{position:fixed;bottom:140px;left:50%;transform:translateX(-50%);display:flex;gap:4px;padding:6px 8px;border-radius:2px;overflow-x:auto;max-width:calc(100vw - 20px);scrollbar-width:none;z-index:15;border:2px solid #7c5f1a;background:#0a0518;}
#toolbar::-webkit-scrollbar{display:none;}
.tile-btn{width:38px;height:38px;border-radius:2px;flex-shrink:0;border:1px solid #443322;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;position:relative;}
.tile-btn.active{border:2px solid #f0c040;box-shadow:0 0 8px #f0c04088;transform:translateY(-4px);}
#actionBtns{position:fixed;bottom:20px;right:12px;display:flex;flex-direction:column;gap:8px;align-items:center;z-index:15;}
.act-btn{width:50px;height:50px;border-radius:50%;border:2px solid #7c5f1a;background:#0a0518;color:#f0c040;font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-direction:column;gap:1px;font-family:'Press Start 2P',monospace;touch-action:manipulation;}
.act-btn .ai{font-size:18px;}
#chatBtn{width:44px;height:44px;}
#chatPanel{position:fixed;bottom:0;left:0;right:0;background:#0d0820ee;border-top:2px solid #7c5f1a;transform:translateY(100%);transition:transform 0.25s;z-index:30;padding-bottom:env(safe-area-inset-bottom);}
#chatPanel.open{transform:translateY(0);}
#chatHeader{display:flex;justify-content:space-between;align-items:center;padding:8px 12px 6px;border-bottom:1px solid #f0c04022;}

#chatClose{background:none;border:none;color:#7c5f1a;font-size:18px;cursor:pointer;}
#chatMessages{height:148px;overflow-y:auto;padding:6px 10px;display:flex;flex-direction:column;gap:3px;}

#chatInputRow{display:flex;gap:6px;padding:6px 10px;}
#chatInput{flex:1;padding:8px;border-radius:2px;font-size:9px;border:1px solid #7c5f1a;background:#0a0518;color:#f0e080;outline:none;font-family:'Press Start 2P',monospace;}
#chatSend{padding:8px 10px;border-radius:2px;border:1px solid #7c5f1a;background:#1a1004;color:#f0c040;font-size:8px;cursor:pointer;font-family:'Press Start 2P',monospace;}
#playerPanel{position:fixed;top:0;right:0;bottom:0;width:200px;background:#0d0820;border-left:2px solid #7c5f1a;transform:translateX(100%);transition:transform 0.25s;z-index:30;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top);}
#playerPanel.open{transform:translateX(0);}
#ppHeader{padding:12px;font-size:8px;color:#f0c040;border-bottom:1px solid #f0c04022;display:flex;justify-content:space-between;align-items:center;}
#ppClose{background:none;border:none;color:#7c5f1a;font-size:18px;cursor:pointer;}
#playerListBody{flex:1;overflow-y:auto;}
.player-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid #f0c04011;}
.p-info{flex:1;overflow:hidden;}

.p-cls{font-size:6px;color:#887755;margin-top:2px;}
.p-acts{display:flex;flex-direction:column;gap:3px;}

.fbtn{background:#0a1808;color:#4ade80;border-color:#336622;}
.fbtn.on{background:#082030;color:#60a5fa;border-color:#224466;}
.bbtn{background:#180808;color:#f87171;border-color:#662222;}
#notifArea{position:fixed;bottom:170px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:5px;pointer-events:none;z-index:40;width:calc(100% - 32px);max-width:320px;}
.notif{background:#0d0820;border:2px solid #7c5f1a;box-shadow:inset 0 0 0 1px #f0c04033;color:#f0e080;padding:8px 12px;font-size:8px;line-height:1.8;animation:nfdn 0.2s ease;letter-spacing:1px;}
.notif::before{content:'▶ ';color:#f0c040;}
@keyframes nfdn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
#modeBadge{position:fixed;top:calc(54px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);padding:4px 12px;font-size:7px;color:#f0c040;background:#0a0518ee;border:1px solid #7c5f1a;pointer-events:none;z-index:15;display:none;letter-spacing:1px;}
</style>

// roundRect polyfill for older mobile browsers
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);
    this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();
  };
}

// ── Map ──────────────────────────────────────────
function genMap(){
  baseMap=[];
  for(let y=0;y<MAP_H;y++){
    baseMap[y]=[];
    for(let x=0;x<MAP_W;x++){
      const n=Math.sin(x*.11+y*.08)*Math.cos(x*.06-y*.09)*.5+.5+Math.sin(x*.28+1.1)*Math.cos(y*.22+.9)*.35;
      baseMap[y][x]=n<.22?1:n<.3?3:n<.33?2:n>.82?4:n>.75?12:0;
    }
  }
}
function gT(x,y){if(x<0||y<0||x>=MAP_W||y>=MAP_H)return 1;const k=x+','+y;return tiles[k]!==undefined?tiles[k]:baseMap[y][x];}

// ── Draw tile ────────────────────────────────────
function drawTile(c,t,px,py,now){
  const d=TILES[t]||TILES[0],S=TILE,cl=d.c;
  c.fillStyle=cl[0];c.fillRect(px,py,S,S);
  if(t===0){
    c.fillStyle=cl[1];for(let i=0;i<4;i++)c.fillRect(px+4+i*11,py+S-16,3,8);
    c.fillStyle=cl[2];c.fillRect(px,py+S-8,S,8);
    const sd=(Math.floor(px/S)*77+Math.floor(py/S)*31)%7;
    if(sd<2){c.fillStyle='#ff88aa';c.fillRect(px+8+sd*20,py+S-18,4,4);}
  } else if(t===1||t===8){
    const w=Math.sin(now*.003+px*.05+py*.04)*.12+.88;
    c.fillStyle=t===1?`rgba(8,30,80,${w})`:`rgba(20,80,200,${w})`;c.fillRect(px,py,S,S);
    c.fillStyle=`rgba(150,200,255,${w*.25})`;
    const wo=Math.floor(now*.04)%S;
    c.fillRect(px+wo-S,py+S*.4,S*.6,3);c.fillRect(px+wo,py+S*.65,S*.4,2);
  } else if(t===2){
    c.fillStyle=cl[1];for(let i=0;i<3;i++)c.fillRect(px+i*16,py+i*12,14,3);
  } else if(t===3){
    c.fillStyle=cl[1];c.fillRect(px+4,py+S/2,S-8,2);c.fillRect(px+8,py+S*.7,S-16,2);
  } else if(t===4){
    c.fillStyle=cl[1];c.fillRect(px+2,py+2,S-4,S/2-2);
    c.fillStyle=cl[2];c.fillRect(px+2,py+S/2,S-4,S/2-2);
    c.fillStyle='rgba(0,0,0,.2)';c.fillRect(px,py+S/2-1,S,2);
  } else if(t===5){
    c.fillStyle=cl[2];for(let i=0;i<3;i++)c.fillRect(px,py+i*16,S,2);
    c.fillStyle=cl[1];c.fillRect(px+S/2-1,py,2,S);
  } else if(t===6){
    c.fillStyle=cl[1];c.fillRect(px,py+S/2-1,S,2);
    c.fillStyle=cl[2];c.fillRect(px+S/2-1,py,2,S/2-1);
    c.fillRect(px,py+S/2+1,S/2-1,2);c.fillRect(px+S/2+1,py+S/2+1,S/2-1,2);
  } else if(t===7){
    c.fillStyle=cl[1];c.fillRect(px+2,py+2,S/2-4,S/2-4);c.fillRect(px+S/2+2,py+S/2+2,S/2-4,S/2-4);
    c.fillStyle=cl[2];c.fillRect(px+S/2+2,py+2,S/2-4,S/2-4);c.fillRect(px+2,py+S/2+2,S/2-4,S/2-4);
  } else if(t===9){
    const f=Math.sin(now*.008+px*py)*.3+.7;
    c.fillStyle=`rgba(220,80,0,${f})`;c.fillRect(px,py,S,S);
    c.fillStyle=`rgba(255,200,0,${f*.7})`;c.fillRect(px+10,py+10,S-20,S-20);
  } else if(t===10){
    c.fillStyle=cl[1];c.fillRect(px,py,S,S);
    const g=c.createRadialGradient(px+S/2,py+S/2,0,px+S/2,py+S/2,S*2);
    const gp=Math.sin(now*.004)*.1+.2;
    g.addColorStop(0,`rgba(255,240,100,${gp})`);g.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=g;c.fillRect(px-S,py-S,S*3,S*3);
  } else if(t===11){
    c.fillStyle=cl[0];c.fillRect(px,py,S,S);
    const fc=['#ff88cc','#ffaadd','#ff66bb','#ffccee','#dd44aa'];
    for(let i=0;i<6;i++){const fx=px+6+(i*7%38),fy=py+6+(i*11%36);c.fillStyle=fc[i%5];c.fillRect(fx,fy,4,4);c.fillStyle='#ffff88';c.fillRect(fx+1,fy+1,2,2);}
  } else if(t===12){
    c.fillStyle=cl[0];c.fillRect(px,py,S,S);
    const bob=Math.sin(now*.002+px)*2;
    c.fillStyle=cl[1];c.beginPath();c.arc(px+S/2,py+S/3+bob,S*.32,0,Math.PI*2);c.fill();
    c.fillStyle=cl[2];c.beginPath();c.arc(px+S/2,py+S/4+bob,S*.24,0,Math.PI*2);c.fill();
    c.fillStyle='#5a3a10';c.fillRect(px+S/2-3,py+S*.55,6,S*.4);
  } else if(t===13){
    c.fillStyle=cl[1];c.fillRect(px,py,S,S);
    c.fillStyle='rgba(255,255,255,.45)';for(let i=0;i<5;i++)c.fillRect(px+4+i*9,py+4+i*6,4,4);
  } else if(t===14){
    c.fillStyle=cl[0];c.fillRect(px,py,S,S);
    c.fillStyle=cl[1];c.fillRect(px,py,S/3,S/2);c.fillRect(px+S*2/3,py,S/3,S/2);
    c.fillStyle=cl[2];c.fillRect(px+S/3,py,S/3,S/2);
    c.fillStyle='rgba(0,0,0,.35)';c.fillRect(px+S/3+6,py+6,S/3-12,S/2-12);
  }
  if(buildMode){c.strokeStyle='rgba(240,192,64,.07)';c.lineWidth=1;c.strokeRect(px,py,S,S);}
}

// ── Draw sprite ───────────────────────────────────
function drawSprite(c,px,py,color,job,frame,isMe,name){
  const S=TILE,f=Math.floor(frame/8)%4,bob=(f===1||f===3)?-1:0;
  // Shadow
  c.fillStyle='rgba(0,0,0,.28)';c.beginPath();c.ellipse(px,py+S*.35,10,4,0,0,Math.PI*2);c.fill();
  // Legs
  c.fillStyle='#222244';
  if(f===0){c.fillRect(px-5,py+bob+8,4,10);c.fillRect(px+1,py+bob+8,4,10);}
  else if(f===1){c.fillRect(px-5,py+bob+8,4,8);c.fillRect(px+1,py+bob+12,4,6);}
  else if(f===2){c.fillRect(px-5,py+bob+8,4,10);c.fillRect(px+1,py+bob+8,4,10);}
  else{c.fillRect(px-5,py+bob+12,4,6);c.fillRect(px+1,py+bob+8,4,8);}
  // Body
  c.fillStyle=color;c.fillRect(px-6,py+bob-4,12,12);
  // Arms & weapon
  if(job==='warrior'){
    c.fillStyle='#8888aa';c.fillRect(px-9,py+bob-3,3,8);c.fillRect(px+6,py+bob-3,3,8);
    c.fillStyle='#ccccee';c.fillRect(px+8,py+bob-10,2,14);
    c.fillStyle='#aa8833';c.fillRect(px+6,py+bob-4,6,3);
  } else if(job==='mage'){
    c.fillStyle='#6644aa';c.fillRect(px-9,py+bob-3,3,8);c.fillRect(px+6,py+bob-3,3,8);
    c.fillStyle='#8866cc';c.fillRect(px+8,py+bob-14,2,18);
    c.fillStyle='#ffcc00';c.fillRect(px+6,py+bob-16,6,6);
    const mg=Date.now()*.006+px;
    c.fillStyle='rgba(150,100,255,.7)';c.fillRect(px+9+Math.cos(mg)*4,py+bob-18+Math.sin(mg)*3,3,3);
  } else if(job==='archer'){
    c.fillStyle='#336633';c.fillRect(px-9,py+bob-3,3,8);c.fillRect(px+6,py+bob-3,3,8);
    c.strokeStyle='#886633';c.lineWidth=2;c.beginPath();c.arc(px+10,py+bob-4,8,-.8,.8);c.stroke();
    c.strokeStyle='#ccaa66';c.lineWidth=1;c.beginPath();c.moveTo(px+10,py+bob-11);c.lineTo(px+10,py+bob+3);c.stroke();
  } else {
    c.fillStyle='#aa8833';c.fillRect(px-9,py+bob-3,3,8);c.fillRect(px+6,py+bob-3,3,8);
    c.fillStyle='#ddcc88';c.fillRect(px+8,py+bob-12,2,16);
    c.fillStyle='#ffffaa';c.fillRect(px+6,py+bob-14,6,4);
    const hs=Math.sin(Date.now()*.008)*3;
    c.fillStyle='rgba(255,255,150,.8)';c.fillRect(px+8,py+bob-18+hs,3,3);
  }
  // Head
  c.fillStyle='#f0c890';c.fillRect(px-6,py+bob-16,12,12);
  c.fillStyle='#222';c.fillRect(px-3,py+bob-13,2,2);c.fillRect(px+1,py+bob-13,2,2);
  const hc={warrior:'#aa2200',mage:'#220088',archer:'#224400',healer:'#885500'};
  c.fillStyle=hc[job]||'#333';c.fillRect(px-6,py+bob-18,12,4);c.fillRect(px-7,py+bob-16,2,6);
  // Crown for self
  if(isMe){c.fillStyle='rgba(240,192,64,.85)';c.fillRect(px-8,py+bob-22,16,3);c.fillRect(px-6,py+bob-24,3,3);c.fillRect(px-1,py+bob-24,3,3);c.fillRect(px+4,py+bob-24,3,3);}
  // Name tag
  c.font='bold 9px "Press Start 2P",monospace';
  const tw=c.measureText(name).width;
  c.fillStyle='rgba(10,5,24,.88)';c.fillRect(px-tw/2-8,py+bob-32,tw+16,13);
  c.strokeStyle=isMe?'#f0c040':'#7c5f1a';c.lineWidth=1;c.strokeRect(px-tw/2-8,py+bob-32,tw+16,13);
  c.fillStyle=isMe?'#f0c040':'#e0d0a0';c.textAlign='center';c.textBaseline='top';
  c.fillText(name,px,py+bob-30);
}

// ── Toolbar ───────────────────────────────────────
function buildToolbar(){
  const bar=document.getElementById('toolbar');bar.innerHTML='';
  TILES.forEach((t,i)=>{
    const btn=document.createElement('div');
    btn.className='tile-btn'+(i===0?' active':'');btn.dataset.tile=t.id;
    btn.style.background=t.c[0];btn.title=t.name;
    btn.textContent=t.e;
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.tile-btn').forEach(x=>x.classList.remove('active'));
      btn.classList.add('active');selTile=t.id;
      if(!buildMode){buildMode=true;document.getElementById('modeBadge').style.display='block';}
    });
    bar.appendChild(btn);
  });
}

// ── Class select ──────────────────────────────────
document.querySelectorAll('.class-btn').forEach(b=>{
  b.addEventListener('click',()=>{document.querySelectorAll('.class-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');myClass=b.dataset.class;});
});

// ── Login ─────────────────────────────────────────
document.getElementById('startBtn').onclick=startGame;
document.getElementById('nameInput').onkeydown=e=>{if(e.key==='Enter')startGame();};

async function tryDB(url){
  return new Promise((res,rej)=>{
    try{
      const app=firebase.initializeApp({...firebaseConfig,databaseURL:url},'app_'+Date.now());
      const d=firebase.database(app);
      // quick connectivity check
      d.ref('.info/connected').once('value',s=>{res(d);}).catch(rej);
      setTimeout(()=>rej(new Error('timeout')),5000);
    }catch(e){rej(e);}
  });
}

async function startGame(){
  const name=document.getElementById('nameInput').value.trim();
  if(!name)return;
  document.getElementById('startBtn').textContent='접속 중...';
  // Try each DB URL
  let connected=false;
  for(const url of DB_URLS){
    try{
      db=await tryDB(url);
      connected=true;break;
    }catch(e){console.warn('DB try failed:',url,e.message);}
  }
  if(!connected){
    // Last resort: just try first URL without check
    try{
      const app=firebase.app('app_'+Date.now());
    }catch(e){}
    try{
      firebase.initializeApp({...firebaseConfig,databaseURL:DB_URLS[0]});
      db=firebase.database();
    }catch(e){
      alert('Firebase 연결 실패!\n\n해결방법:\n1. Firebase 콘솔 → Realtime Database\n2. 상단 URL 복사\n3. 개발자에게 전달');
      document.getElementById('startBtn').textContent='▶ 모험 시작';
      return;
    }
  }

  myName=name;myId=uid();myColor=CLS_COLOR[myClass];
  genMap();buildToolbar();
  const sx=MAP_W/2*TILE+(Math.random()-.5)*400,sy=MAP_H/2*TILE+(Math.random()-.5)*400;
  myPos={x:sx,y:sy};cam={x:sx-canvas.width/2,y:sy-canvas.height/2};
  document.getElementById('playerNameHud').textContent=CLS_ICON[myClass]+' '+myName;
  db.ref('tiles').on('value',s=>{tiles=s.val()||{};});
  const myRef=db.ref('players/'+myId);
  myRef.set({name:myName,color:myColor,jobClass:myClass,x:sx,y:sy,lastSeen:Date.now()});
  myRef.onDisconnect().remove();
  db.ref('players').on('value',s=>{players=s.val()||{};updatePP();const cnt=Object.values(players).filter(p=>p&&Date.now()-(p.lastSeen||0)<12000).length;document.getElementById('onlineBadge').textContent='👥'+cnt;});
  db.ref('chat').limitToLast(50).on('value',s=>{renderChat(Object.values(s.val()||{}).sort((a,b)=>a.t-b.t));});
  db.ref('social/'+myId).once('value',s=>{const d=s.val()||{};following=new Set(d.following||[]);blocked=new Set(d.blocked||[]);});
  document.getElementById('loginScreen').style.display='none';
  notif(CLS_ICON[myClass]+' '+myName+'의 모험이 시작되었다！');
  loop();
}

function syncPos(){if(!db||!myId)return;const now=Date.now();if(now-lastSend<100)return;lastSend=now;db.ref('players/'+myId).update({x:myPos.x,y:myPos.y,lastSeen:now});}

// ── Joystick ──────────────────────────────────────
const jWrap=document.getElementById('joystickWrap'),jKnob=document.getElementById('joystickKnob'),JR=44;
jWrap.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0],r=jWrap.getBoundingClientRect();jOrigin={x:r.left+r.width/2,y:r.top+r.height/2};jActive=true;updateJ(t.clientX,t.clientY);},{passive:false});
jWrap.addEventListener('touchmove',e=>{e.preventDefault();if(!jActive)return;updateJ(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
jWrap.addEventListener('touchend',e=>{e.preventDefault();jActive=false;jDelta={x:0,y:0};jKnob.style.transform='translate(0,0)';},{passive:false});
function updateJ(cx,cy){let dx=cx-jOrigin.x,dy=cy-jOrigin.y;const d=Math.sqrt(dx*dx+dy*dy);if(d>JR){dx=dx/d*JR;dy=dy/d*JR;}jDelta={x:dx/JR,y:dy/JR};jKnob.style.transform='translate('+dx+'px,'+dy+'px)';}

canvas.addEventListener('touchstart',e=>{if(!buildMode)return;e.preventDefault();const t=e.changedTouches[0];const wx=Math.floor((t.clientX+cam.x)/TILE),wy=Math.floor((t.clientY+cam.y)/TILE);if(wx<0||wy<0||wx>=MAP_W||wy>=MAP_H)return;const k=wx+','+wy;db.ref('tiles/'+wx+'_'+wy).set(selTile);tiles[k]=selTile;},{passive:false});
document.getElementById('removeBtn').addEventListener('click',()=>{const wx=Math.floor(myPos.x/TILE),wy=Math.floor(myPos.y/TILE);db.ref('tiles/'+wx+'_'+wy).remove();delete tiles[wx+','+wy];notif('블록을 부수었다！');});
document.getElementById('placeBtn').addEventListener('click',()=>{if(!buildMode){buildMode=true;document.getElementById('modeBadge').style.display='block';}notif('화면을 탭하여 설치！');});
document.getElementById('menuBtn').onclick=()=>{buildMode=!buildMode;document.getElementById('modeBadge').style.display=buildMode?'block':'none';};
document.getElementById('chatBtn').onclick=()=>{chatOpen=!chatOpen;document.getElementById('chatPanel').classList.toggle('open',chatOpen);};
document.getElementById('chatClose').onclick=()=>{chatOpen=false;document.getElementById('chatPanel').classList.remove('open');};
document.getElementById('chatSend').onclick=sendChat;
document.getElementById('chatInput').onkeydown=e=>{if(e.key==='Enter')sendChat();};
function sendChat(){const msg=document.getElementById('chatInput').value.trim();if(!msg||!db)return;document.getElementById('chatInput').value='';db.ref('chat').push({name:myName,color:myColor,jobClass:myClass,msg,t:Date.now()});}
function renderChat(msgs){const box=document.getElementById('chatMessages');box.innerHTML='';msgs.slice(-30).forEach(m=>{const d=document.createElement('div');d.className='chat-msg';if(m.system){d.classList.add('sys');d.textContent=m.msg;}else d.innerHTML=(CLS_ICON[m.jobClass]||'👤')+' <span class="sender" style="color:'+(m.color||'#f0c040')+'">'+esc(m.name)+'</span>: '+esc(m.msg);box.appendChild(d);});box.scrollTop=box.scrollHeight;}
document.getElementById('ppClose').onclick=()=>{ppOpen=false;document.getElementById('playerPanel').classList.remove('open');};
function updatePP(){const body=document.getElementById('playerListBody');body.innerHTML='';const now=Date.now();Object.entries(players).forEach(([id,p])=>{if(!p||blocked.has(id))return;if(id!==myId&&p.lastSeen&&now-p.lastSeen>12000)return;const item=document.createElement('div');item.className='player-item';item.innerHTML='<div class="p-info"><div class="p-name">'+(CLS_ICON[p.jobClass]||'👤')+' '+esc(p.name)+(id===myId?' ★':'')+'</div><div class="p-cls" style="color:'+(p.color||'#f0c040')+'">'+((p.jobClass||'warrior').toUpperCase())+'</div></div>';if(id!==myId){const wrap=document.createElement('div');wrap.className='p-acts';const fb=document.createElement('button');fb.className='act2 fbtn'+(following.has(id)?' on':'');fb.textContent=following.has(id)?'✓팔로':'팔로';fb.onclick=()=>{if(following.has(id)){following.delete(id);}else{following.add(id);notif(p.name+' 파티 추가！');}saveSocial();updatePP();};const bb=document.createElement('button');bb.className='act2 bbtn';bb.textContent='차단';bb.onclick=()=>{blocked.add(id);saveSocial();updatePP();notif(p.name+' 차단。');};wrap.appendChild(fb);wrap.appendChild(bb);item.querySelector('.p-info').style.cursor='pointer';item.querySelector('.p-info').onclick=()=>{myPos.x=p.x+60;myPos.y=p.y;notif('🏃 '+p.name+'에게 이동！');ppOpen=false;document.getElementById('playerPanel').classList.remove('open');};item.appendChild(wrap);}body.appendChild(item);});}
function saveSocial(){if(!db)return;db.ref('social/'+myId).set({following:[...following],blocked:[...blocked]});}
document.getElementById('menuBtn').addEventListener('click',()=>{ppOpen=!ppOpen;document.getElementById('playerPanel').classList.toggle('open',ppOpen);},true);

const SPD=3;
function updateMove(){if(!jActive||!myId)return;const dx=jDelta.x*SPD,dy=jDelta.y*SPD;const nx=clamp(myPos.x+dx,0,MAP_W*TILE-1),ny=clamp(myPos.y+dy,0,MAP_H*TILE-1);if(!WATER.has(gT(Math.floor(nx/TILE),Math.floor(ny/TILE)))){myPos.x=nx;myPos.y=ny;}animF++;syncPos();}
function updateCam(){const tx=myPos.x-canvas.width/2,ty=myPos.y-canvas.height/2;cam.x+=(tx-cam.x)*.1;cam.y+=(ty-cam.y)*.1;cam.x=clamp(cam.x,0,MAP_W*TILE-canvas.width);cam.y=clamp(cam.y,0,MAP_H*TILE-canvas.height);}

function drawWorld(now){
  const sx=Math.floor(cam.x/TILE),sy=Math.floor(cam.y/TILE);
  const ex=Math.min(MAP_W,sx+Math.ceil(canvas.width/TILE)+2),ey=Math.min(MAP_H,sy+Math.ceil(canvas.height/TILE)+2);
  for(let y=sy;y<ey;y++)for(let x=sx;x<ex;x++)drawTile(ctx,gT(x,y),x*TILE-cam.x,y*TILE-cam.y,now);
}
function drawPlayers(){
  const pnow=Date.now(),list=[];
  Object.entries(players).forEach(([id,p])=>{if(!p||blocked.has(id)||id===myId)return;if(p.lastSeen&&pnow-p.lastSeen>12000)return;list.push({...p,id,isMe:false});});
  if(myId)list.push({x:myPos.x,y:myPos.y,name:myName,color:myColor,jobClass:myClass,id:myId,isMe:true});
  list.sort((a,b)=>a.y-b.y);
  list.forEach(p=>{
    const sx=p.x-cam.x,sy=p.y-cam.y;
    if(sx<-60||sy<-60||sx>canvas.width+60||sy>canvas.height+60)return;
    const fr=p.isMe?animF:Math.floor(pnow/120+p.x)%32;
    drawSprite(ctx,sx,sy,p.color||'#ff6644',p.jobClass||'warrior',fr,p.isMe,p.name+(p.isMe?' ★':''));
  });
}
function drawMM(){
  const mw=76,mh=50,sx=mw/MAP_W,sy=mh/MAP_H;
  mm.fillStyle='#000';mm.fillRect(0,0,mw,mh);
  for(let y=0;y<MAP_H;y+=2)for(let x=0;x<MAP_W;x+=2){mm.fillStyle=TILES[gT(x,y)]?.c[0]||'#3a7a2a';mm.fillRect(x*sx,y*sy,sx*2,sy*2);}
  mm.strokeStyle='rgba(240,192,64,.6)';mm.lineWidth=1;mm.strokeRect(cam.x/TILE*sx,cam.y/TILE*sy,canvas.width/TILE*sx,canvas.height/TILE*sy);
  const pnow=Date.now();
  Object.entries(players).forEach(([id,p])=>{if(!p||blocked.has(id))return;if(id!==myId&&p.lastSeen&&pnow-p.lastSeen>12000)return;mm.fillStyle=p.color||'#fff';mm.fillRect(p.x/TILE*sx-1,p.y/TILE*sy-1,3,3);});
  if(myPos){mm.fillStyle='#f0c040';mm.fillRect(myPos.x/TILE*sx-2,myPos.y/TILE*sy-2,4,4);}
}

function loop(){
  const now=Date.now();updateMove();updateCam();
  ctx.fillStyle='#0a1a0a';ctx.fillRect(0,0,canvas.width,canvas.height);
  drawWorld(now);drawPlayers();
  // Vignette
  const vg=ctx.createRadialGradient(canvas.width/2,canvas.height/2,canvas.height*.3,canvas.width/2,canvas.height/2,canvas.height*.9);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.4)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,canvas.width,canvas.height);
  drawMM();
  requestAnimationFrame(loop);
}
setInterval(()=>{if(db&&myId)db.ref('players/'+myId+'/lastSeen').set(Date.now());},4000);
</script>
