<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🏕️ 개척 세계</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#000;overflow:hidden;touch-action:none;font-family:'Press Start 2P',monospace;}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}

#loginScreen{
  position:fixed;inset:0;z-index:999;
  background:radial-gradient(ellipse at 50% 60%,#2a1a08,#0a0500);
  display:flex;align-items:center;justify-content:center;
}
#loginBox{
  display:flex;flex-direction:column;align-items:center;gap:16px;
  padding:28px 22px;width:calc(100% - 32px);max-width:320px;
  background:linear-gradient(180deg,#1a0e04,#0d0700);
  border:3px solid #8a6a2a;border-radius:3px;
}
#loginTitle{
  font-size:clamp(9px,3vw,14px);color:#f0c040;
  text-shadow:0 0 12px #f0c04088,0 2px 0 #7c5010;
  text-align:center;line-height:2.2;
}
#loginTitle small{font-size:.65em;color:#c8901a;display:block;margin-top:4px;}

/* 캐릭터 미리보기 */
#charPreview{
  width:80px;height:80px;border-radius:50%;
  border:3px solid #8a6a2a;overflow:hidden;
  background:#0a0500;display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 16px #f0c04044;
}
#charPreview img{width:72px;height:72px;image-rendering:pixelated;}
#previewLabel{font-size:7px;color:#c8a040;}

.ri{
  padding:12px 14px;font-size:11px;border-radius:2px;
  border:2px solid #8a6a2a;background:#080500;color:#f0e060;
  outline:none;text-align:center;width:100%;
  font-family:'Press Start 2P',monospace;
}
.ri::placeholder{color:#5a4020;font-size:9px;}
.ri:focus{border-color:#f0c040;}
#classSelect{display:flex;gap:6px;width:100%;}
.cb{
  flex:1;padding:8px 2px;font-size:7px;border-radius:2px;
  border:2px solid #5a3a10;background:#080500;color:#7a5a30;
  cursor:pointer;text-align:center;line-height:1.9;
  font-family:'Press Start 2P',monospace;
}
.cb .ci{font-size:17px;display:block;}
.cb.sel{border-color:#f0c040;color:#f0c040;background:#180e00;}
.rb{
  padding:13px 0;font-size:10px;border-radius:2px;
  border:2px solid #8a6a2a;
  background:linear-gradient(180deg,#3a2808,#1a1000);
  color:#f0c040;cursor:pointer;width:100%;
  font-family:'Press Start 2P',monospace;letter-spacing:2px;
  box-shadow:0 4px 0 #050200;
}
.rb:active{transform:translateY(3px);box-shadow:0 1px 0 #050200;}

/* HUD */
#topHud{
  position:fixed;top:0;left:0;right:0;z-index:20;
  padding:6px 8px;padding-top:calc(6px + env(safe-area-inset-top));
  display:flex;align-items:center;gap:8px;
  background:linear-gradient(180deg,rgba(0,0,0,.85),transparent);
}
#pName{font-size:7px;color:#f0c040;flex:1;text-shadow:0 0 6px #f0c04066;}
#oc{font-size:7px;color:#f0c040;}
#mm{width:80px;height:54px;border:2px solid #8a6a2a;overflow:hidden;flex-shrink:0;}

/* Joystick */
#jWrap{
  position:fixed;bottom:22px;left:18px;
  width:120px;height:120px;border-radius:50%;
  background:rgba(10,6,0,.55);
  border:2px solid rgba(138,106,42,.45);
  display:flex;align-items:center;justify-content:center;
  z-index:15;touch-action:none;
}
#jKnob{
  width:48px;height:48px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#f0c040,#7c5010);
  border:2px solid #f0e060;pointer-events:none;
  box-shadow:0 0 12px rgba(240,192,64,.4);
}

/* Action buttons */
#actionPad{
  position:fixed;bottom:22px;right:14px;
  width:148px;height:148px;
  display:grid;
  grid-template-columns:repeat(3,46px);
  grid-template-rows:repeat(3,46px);
  gap:5px;z-index:15;
}
.actBtn{
  width:46px;height:46px;border-radius:50%;
  border:2px solid rgba(255,255,255,.25);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;touch-action:manipulation;user-select:none;
  font-family:'Press Start 2P',monospace;
  box-shadow:0 3px 0 rgba(0,0,0,.5);gap:1px;
}
.actBtn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.5);}
.actBtn .bl{font-size:7px;color:rgba(255,255,255,.9);font-weight:700;}
.actBtn .bi{font-size:15px;line-height:1;}
.actBtn.blank{background:transparent;border:none;box-shadow:none;pointer-events:none;}
#btnA{background:radial-gradient(circle at 40% 35%,#ff5533,#cc1100);border-color:#ff7755;}
#btnB{background:radial-gradient(circle at 40% 35%,#4488ff,#1133cc);border-color:#66aaff;}
#btnC{background:radial-gradient(circle at 40% 35%,#44cc66,#118833);border-color:#66ee88;}
#btnD{background:radial-gradient(circle at 40% 35%,#ffcc22,#cc8800);border-color:#ffee66;}

/* D 설정 팝업 */
#dPopup{
  position:fixed;bottom:180px;right:14px;
  background:#0d0800;border:2px solid #8a6a2a;padding:10px;
  border-radius:3px;z-index:40;display:none;flex-direction:column;gap:6px;width:160px;
}
#dPopup.open{display:flex;}
#dPopup .dp-title{font-size:7px;color:#f0c040;text-align:center;margin-bottom:4px;}
.dopt{
  padding:7px 10px;font-size:7px;border:1px solid #5a3a10;
  background:#180e00;color:#f0d888;cursor:pointer;
  font-family:'Press Start 2P',monospace;border-radius:2px;text-align:center;
}
.dopt.selected{border-color:#f0c040;color:#f0c040;background:#2a1800;}

/* Chat button */
#chatToggle{
  position:fixed;bottom:90px;right:18px;
  width:44px;height:44px;border-radius:50%;
  border:2px solid #8a6a2a;background:#0d0800;
  color:#f0c040;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:15;touch-action:manipulation;
}
#chatUnread{
  position:absolute;top:-4px;right:-4px;width:18px;height:18px;
  border-radius:50%;background:#ee3333;color:#fff;
  font-size:8px;display:none;align-items:center;justify-content:center;
}

/* Chat panel */
#chatPanel{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(8,5,0,.96);border-top:2px solid #8a6a2a;
  transform:translateY(100%);transition:transform .25s;z-index:30;
  padding-bottom:env(safe-area-inset-bottom);
}
#chatPanel.open{transform:translateY(0);}
#chatHdr{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 14px 6px;border-bottom:1px solid #c8a04022;
}
#chatHdr span{font-size:8px;color:#f0c040;}
#chatX{background:none;border:none;color:#8a6a2a;font-size:20px;cursor:pointer;}
#chatLog{
  height:150px;overflow-y:auto;padding:8px 12px;
  display:flex;flex-direction:column;gap:4px;
}
.cm{font-size:8px;line-height:1.8;word-break:break-word;color:#c8b07a;}
.cm .sn{font-weight:700;}
.cm.sys{color:#6a5030;font-style:italic;}
#chatRow{display:flex;gap:6px;padding:8px 12px;}
#chatIn{
  flex:1;padding:10px 12px;border-radius:2px;font-size:10px;
  border:1px solid #8a6a2a;background:#080500;color:#f0e060;
  outline:none;font-family:'Press Start 2P',monospace;
}
#chatSd{
  padding:10px 14px;border-radius:2px;border:1px solid #8a6a2a;
  background:#1a1000;color:#f0c040;font-size:9px;cursor:pointer;
  font-family:'Press Start 2P',monospace;
}

/* Notif */
#nArea{
  position:fixed;bottom:170px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;gap:5px;
  pointer-events:none;z-index:40;width:calc(100% - 80px);max-width:280px;
}
.nf{
  background:#0d0800;border:2px solid #8a6a2a;
  color:#f0e080;padding:7px 12px;font-size:8px;line-height:1.8;
  animation:nfIn .2s ease;
}
.nf::before{content:'▶ ';color:#f0c040;}
@keyframes nfIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* Hit flash */
#hitFlash{position:fixed;inset:0;pointer-events:none;z-index:50;transition:background .1s;}
#fxCanvas{position:fixed;inset:0;pointer-events:none;z-index:19;}
</style>
</head>
<body>

<div id="loginScreen">
  <div id="loginBox">
    <div id="loginTitle">🏕️ 개척 세계<small>~ 황무지를 마을로 ~</small></div>

    <!-- 실시간 캐릭터 미리보기 -->
    <div id="charPreview">
      <img id="previewImg" src="https://api.dicebear.com/9.x/pixel-art/png?seed=hero&size=72" crossorigin="anonymous"/>
    </div>
    <div id="previewLabel">닉네임을 입력하면 캐릭터가 생성돼요</div>

    <input class="ri" id="nameIn" type="text" placeholder="이름을 입력하시오..." maxlength="10" autocomplete="off"/>

    <div style="font-size:7px;color:#7a5a30;">직업 선택</div>
    <div id="classSelect">
      <div class="cb sel" data-c="warrior"><span class="ci">⚔️</span>전사</div>
      <div class="cb" data-c="mage"><span class="ci">🔮</span>마법사</div>
      <div class="cb" data-c="archer"><span class="ci">🏹</span>궁수</div>
      <div class="cb" data-c="healer"><span class="ci">✨</span>힐러</div>
    </div>
    <button class="rb" id="startBtn">▶ 개척 시작</button>
  </div>
</div>

<canvas id="gc"></canvas>

<div id="topHud">
  <div id="pName">용사</div>
  <div id="oc">👥 0명</div>
  <canvas id="mm" width="76" height="50"></canvas>
</div>

<div id="jWrap"><div id="jKnob"></div></div>

<!-- Action pad -->
<div id="actionPad">
  <div class="actBtn blank"></div>
  <div class="actBtn" id="btnB"><span class="bi">✨</span><span class="bl">B</span></div>
  <div class="actBtn blank"></div>
  <div class="actBtn" id="btnC"><span class="bi">💬</span><span class="bl">C</span></div>
  <div class="actBtn blank"></div>
  <div class="actBtn" id="btnA"><span class="bi">⚔️</span><span class="bl">A</span></div>
  <div class="actBtn blank"></div>
  <div class="actBtn" id="btnD"><span class="bi">👋</span><span class="bl">D</span></div>
  <div class="actBtn blank"></div>
</div>

<div id="dPopup">
  <div class="dp-title">⚙ D버튼 설정</div>
  <div class="dopt selected" data-d="emote_wave">👋 손흔들기</div>
  <div class="dopt" data-d="emote_heart">❤️ 하트</div>
  <div class="dopt" data-d="emote_laugh">😂 웃음</div>
  <div class="dopt" data-d="emote_angry">😡 화남</div>
  <div class="dopt" data-d="sprint">💨 달리기</div>
</div>

<div id="chatToggle">💬<div id="chatUnread"></div></div>

<div id="chatPanel">
  <div id="chatHdr"><span>💬 마을 채팅</span><button id="chatX">✕</button></div>
  <div id="chatLog"></div>
  <div id="chatRow">
    <input id="chatIn" type="text" placeholder="메시지 입력..." maxlength="30" autocomplete="off"/>
    <button id="chatSd">전송</button>
  </div>
</div>

<div id="hitFlash"></div>
<canvas id="fxCanvas"></canvas>
<div id="nArea"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
// ── Firebase ──────────────────────────────
const FB={
  apiKey:"AIzaSyDy-J4d37ucBO36-mfJbtpBRxNLcRusNr8",
  authDomain:"game-test-001-57821.firebaseapp.com",
  databaseURL:"https://game-test-001-57821-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"game-test-001-57821",
  storageBucket:"game-test-001-57821.firebasestorage.app",
  messagingSenderId:"795750968042",
  appId:"1:795750968042:web:52026a20a4ad831efa8593"
};

// ── Constants ─────────────────────────────
const TS=64, MW=120, MH=90;
const DIR={DOWN:0,UP:1,LEFT:2,RIGHT:3};
const CLS_I={warrior:'⚔️',mage:'🔮',archer:'🏹',healer:'✨'};
const CLS_C={warrior:'#ff4422',mage:'#8844ff',archer:'#22cc44',healer:'#ffcc00'};
const SKILLS={
  warrior:{name:'회오리베기',emoji:'🌀'},
  mage:{name:'파이어볼',emoji:'🔥'},
  archer:{name:'화살비',emoji:'🏹'},
  healer:{name:'힐링',emoji:'💚'},
};

// ── State ─────────────────────────────────
let db,myId,myName,myColor,myClass='warrior';
let players={};
let myPos={x:0,y:0},myDir=DIR.DOWN,myWalkFrame=0;
let cam={x:0,y:0};
let lastSync=0,walkTick=0;
const held={up:false,down:false,left:false,right:false};
const bubbles={};
let chatOpen=false,unreadCount=0;
let sprintActive=false;
let dConfig='emote_wave';
let attackCooldown=0,skillCooldown=0;

// ── DiceBear sprite cache ──────────────────
// seed → {img, loaded}
const spriteCache={};

function getDiceBearURL(seed){
  // Use DiceBear pixel-art style
  const clean=encodeURIComponent(String(seed).slice(0,20));
  return `https://api.dicebear.com/9.x/pixel-art/png?seed=${clean}&size=64&backgroundColor=transparent`;
}

function getSprite(seed){
  if(spriteCache[seed]) return spriteCache[seed];
  const entry={img:new Image(),loaded:false};
  entry.img.crossOrigin='anonymous';
  entry.img.onload=()=>{entry.loaded=true;};
  entry.img.onerror=()=>{entry.loaded=false;};
  entry.img.src=getDiceBearURL(seed);
  spriteCache[seed]=entry;
  return entry;
}

// ── Canvas ────────────────────────────────
const gc=document.getElementById('gc');
const ctx=gc.getContext('2d');
const mmEl=document.getElementById('mm');
const mm=mmEl.getContext('2d');
function resize(){gc.width=window.innerWidth;gc.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

// FX canvas
const fxC=document.getElementById('fxCanvas');
const fxCtx=fxC.getContext('2d');
function resizeFX(){fxC.width=window.innerWidth;fxC.height=window.innerHeight;}
resizeFX();window.addEventListener('resize',resizeFX);
let fxParticles=[];

// ── Map (황무지 + noise decoration) ────────
let decorMap=[];
function genDecor(){
  decorMap=[];
  for(let y=0;y<MH;y++){
    decorMap[y]=[];
    for(let x=0;x<MW;x++){
      const n=(Math.sin(x*.41+y*.23)*Math.cos(x*.17-y*.37)+1)*.5;
      // 0=plain 1=rock 2=dead bush 3=dry crack zone 4=light patch
      decorMap[y][x]=n>.86?1:n>.78?2:n>.7?4:n<.12?3:0;
    }
  }
}

// ── Tile drawing (improved wasteland) ─────
// Color palette zones based on position
function zoneColor(x,y){
  // Subtle large-scale color variation
  const z=Math.sin(x*.06)*Math.cos(y*.05)*.5+.5;
  if(z>.7) return ['#9a7a48','#aa8a58','#8a6a38']; // lighter sand
  if(z<.3) return ['#6a4a22','#7a5a32','#5a3a12']; // darker brown
  return    ['#8a6a3a','#9a7a4a','#7a5a2a'];        // base
}

function drawGround(x,y,px,py,now){
  const s=(x*73856+y*49381)&0xffff;
  const S=TS;
  const [c0,c1,c2]=zoneColor(x,y);

  // Base fill
  ctx.fillStyle=c0;ctx.fillRect(px,py,S,S);

  // Subtle texture squares (픽셀 그리기)
  ctx.fillStyle=c1;
  if(s%3===0){ctx.fillRect(px+s%48+2,py+s%44+2,6,6);}
  if(s%5===1){ctx.fillRect(px+s%40+4,py+s%36+8,4,4);}

  // Crack pattern
  ctx.strokeStyle='rgba(0,0,0,0.12)';ctx.lineWidth=1;
  const crackType=s%6;
  if(crackType===0){
    ctx.beginPath();ctx.moveTo(px+6,py+10);ctx.lineTo(px+18,py+26);ctx.lineTo(px+12,py+40);ctx.stroke();
  }else if(crackType===1){
    ctx.beginPath();ctx.moveTo(px+36,py+6);ctx.lineTo(px+26,py+28);ctx.lineTo(px+38,py+48);ctx.stroke();
  }else if(crackType===2){
    ctx.beginPath();ctx.moveTo(px+10,py+38);ctx.lineTo(px+28,py+52);ctx.stroke();
  }else if(crackType===3){
    ctx.beginPath();ctx.moveTo(px+44,py+16);ctx.lineTo(px+30,py+34);ctx.stroke();
    ctx.beginPath();ctx.moveTo(px+30,py+34);ctx.lineTo(px+42,py+48);ctx.stroke();
  }

  // Decoration overlay
  const d=decorMap[y]?decorMap[y][x]:0;
  if(d===1){ // Rock
    ctx.fillStyle='#6a6a6a';
    ctx.beginPath();ctx.ellipse(px+s%36+10,py+s%28+12,8+s%5,6+s%4,(s*.02),0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#8a8a8a';
    ctx.beginPath();ctx.ellipse(px+s%36+7,py+s%28+9,4,3,(s*.02),0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.beginPath();ctx.ellipse(px+s%36+12,py+s%28+16,8+s%5,3,0,0,Math.PI*2);ctx.fill();
  }else if(d===2){ // Dead bush
    ctx.fillStyle='#5a4020';
    ctx.fillRect(px+s%40+8,py+s%32+20,3,16);
    ctx.fillStyle='#7a5a30';
    ctx.fillRect(px+s%40+4,py+s%32+16,12,3);
    ctx.fillRect(px+s%40+6,py+s%32+20,3,3);
    ctx.fillRect(px+s%40+10,py+s%32+20,3,3);
  }else if(d===3){ // Dry crack zone — extra deep cracks
    ctx.strokeStyle='rgba(0,0,0,0.22)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(px,py+S/2);ctx.lineTo(px+S/3,py+S/3);ctx.lineTo(px+S,py+S*.6);ctx.stroke();
    ctx.beginPath();ctx.moveTo(px+S/2,py);ctx.lineTo(px+S*.4,py+S/2);ctx.stroke();
    ctx.lineWidth=1;
  }else if(d===4){ // Light sandy patch
    ctx.fillStyle='rgba(220,190,130,0.25)';
    ctx.beginPath();ctx.ellipse(px+S/2,py+S/2,S*.4,S*.35,s*.01,0,Math.PI*2);ctx.fill();
  }

  // Occasional dry grass tuft
  if(s%11===0){
    ctx.fillStyle='#6a5018';
    const gx=px+s%44+4,gy=py+s%40+10;
    ctx.fillRect(gx,gy+6,2,8);ctx.fillRect(gx+3,gy+4,2,10);ctx.fillRect(gx+6,gy+7,2,7);
    // Leaning effect
    ctx.fillRect(gx-1,gy+4,2,6);
  }
}

// ── Draw character (DiceBear sprite) ──────
function drawCharacter(cx,cy,seed,dir,walkF,isMe,name,color,jobClass){
  const S=TS;
  const bob=(walkF===1)?-2:0; // walking bounce

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath();ctx.ellipse(cx,cy+S*.35,12,5,0,0,Math.PI*2);ctx.fill();

  // Get sprite
  const entry=getSprite(seed);
  const sprW=48,sprH=48; // render size

  ctx.save();
  // Flip horizontally for LEFT direction
  if(dir===DIR.LEFT){
    ctx.translate(cx,0);ctx.scale(-1,1);ctx.translate(-cx,0);
  }
  // Slight tilt for UP/DOWN feel
  if(dir===DIR.UP){ctx.globalAlpha=0.92;}

  if(entry&&entry.loaded){
    // Draw DiceBear sprite
    ctx.drawImage(entry.img,cx-sprW/2,cy-sprH+bob+8,sprW,sprH);
  }else{
    // Fallback while loading — colored circle with class icon
    ctx.fillStyle=color||'#888';
    ctx.beginPath();ctx.arc(cx,cy-12+bob,18,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.font='20px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(CLS_I[jobClass]||'👤',cx,cy-12+bob);
  }
  ctx.restore();

  // Direction indicator (small arrow below sprite)
  const arrows=[' ▼',' ▲',' ◀',' ▶'];
  ctx.font='8px serif';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText(arrows[dir]||'',cx,cy+S*.18+bob);

  // Crown for self
  if(isMe){
    ctx.fillStyle='rgba(240,192,64,.92)';
    ctx.fillRect(cx-10,cy-sprH+bob+2,20,4);
    ctx.fillRect(cx-8,cy-sprH+bob-2,4,4);
    ctx.fillRect(cx-2,cy-sprH+bob-2,4,4);
    ctx.fillRect(cx+4,cy-sprH+bob-2,4,4);
  }

  // Name tag
  ctx.font='bold 8px "Press Start 2P",monospace';
  const tw=ctx.measureText(name).width;
  ctx.fillStyle='rgba(8,5,0,.88)';
  ctx.fillRect(cx-tw/2-7,cy-sprH+bob-16,tw+14,13);
  ctx.strokeStyle=isMe?'#f0c040':'#8a6a2a';ctx.lineWidth=1;
  ctx.strokeRect(cx-tw/2-7,cy-sprH+bob-16,tw+14,13);
  ctx.fillStyle=isMe?'#f0c040':'#f0d888';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText(name,cx,cy-sprH+bob-15);
}

// ── Speech bubble ─────────────────────────
function drawBubble(cx,cy,msg,color){
  ctx.font='bold 9px "Press Start 2P",monospace';
  const maxW=130;
  const chars=[...msg];
  const lines=[];let cur='';
  for(const ch of chars){
    if(ctx.measureText(cur+ch).width>maxW-14){lines.push(cur);cur=ch;}
    else cur+=ch;
  }
  if(cur)lines.push(cur);
  const lh=14,pad=7;
  const bw=Math.max(...lines.map(l=>ctx.measureText(l).width))+pad*2;
  const bh=lines.length*lh+pad*2;
  const bx=cx-bw/2,by=cy-bh;

  // Bubble shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();ctx.roundRect(bx+2,by+2,bw,bh,5);ctx.fill();
  // Bubble body
  ctx.fillStyle='rgba(255,255,240,0.97)';
  ctx.beginPath();ctx.roundRect(bx,by,bw,bh,5);ctx.fill();
  ctx.strokeStyle=color||'#8a6a2a';ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(bx,by,bw,bh,5);ctx.stroke();
  // Tail
  ctx.fillStyle='rgba(255,255,240,0.97)';
  ctx.beginPath();ctx.moveTo(cx-5,by+bh);ctx.lineTo(cx+5,by+bh);ctx.lineTo(cx,by+bh+7);ctx.fill();
  ctx.strokeStyle=color||'#8a6a2a';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(cx-5,by+bh+1);ctx.lineTo(cx,by+bh+7);ctx.lineTo(cx+5,by+bh+1);ctx.stroke();
  // Text
  ctx.fillStyle='#2a1a00';ctx.textAlign='center';ctx.textBaseline='top';
  lines.forEach((l,i)=>ctx.fillText(l,cx,by+pad+i*lh));
}

// ── FX particles ──────────────────────────
function addParticles(x,y,emoji,count){
  for(let i=0;i<count;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=2+Math.random()*4;
    fxParticles.push({
      x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-2,
      life:1,decay:.02+Math.random()*.02,emoji,size:16+Math.random()*8
    });
  }
}
function updateFX(){
  fxCtx.clearRect(0,0,fxC.width,fxC.height);
  fxParticles=fxParticles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life-=p.decay;
    if(p.life<=0)return false;
    fxCtx.save();fxCtx.globalAlpha=p.life;
    fxCtx.font=`${p.size}px serif`;
    fxCtx.textAlign='center';fxCtx.textBaseline='middle';
    fxCtx.fillText(p.emoji,p.x,p.y);
    fxCtx.restore();return true;
  });
}

// ── Minimap ───────────────────────────────
function drawMinimap(){
  const mw=76,mh=50,scx=mw/MW,scy=mh/MH;
  mm.fillStyle='#6a4a1a';mm.fillRect(0,0,mw,mh);
  // Zone colors on minimap
  for(let y=0;y<MH;y+=2)for(let x=0;x<MW;x+=2){
    const [c]=zoneColor(x,y);mm.fillStyle=c;mm.fillRect(x*scx,y*scy,scx*2,scy*2);
  }
  mm.strokeStyle='rgba(240,192,64,.6)';mm.lineWidth=1;
  mm.strokeRect(cam.x/TS*scx,cam.y/TS*scy,gc.width/TS*scx,gc.height/TS*scy);
  const now=Date.now();
  Object.entries(players).forEach(([id,p])=>{
    if(!p)return;if(id!==myId&&p.lastSeen&&now-p.lastSeen>12000)return;
    mm.fillStyle=p.color||'#fff';mm.fillRect(p.x/TS*scx-1,p.y/TS*scy-1,3,3);
  });
  mm.fillStyle='#f0c040';mm.fillRect(myPos.x/TS*scx-2,myPos.y/TS*scy-2,4,4);
}

// ── Util ──────────────────────────────────
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function notif(msg){
  const el=document.createElement('div');el.className='nf';el.textContent=msg;
  document.getElementById('nArea').appendChild(el);setTimeout(()=>el.remove(),2800);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);
    this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();
  };
}

function startGame(){
  const name=document.getElementById('nameIn').value.trim();
  if(!name)return;
  document.getElementById('startBtn').textContent='접속 중...';
  try{firebase.initializeApp(FB);}catch(e){}
  try{db=firebase.database();}catch(e){
    try{
      const a=firebase.initializeApp({...FB,databaseURL:"https://game-test-001-57821-default-rtdb.firebaseio.com"},'fb2');
      db=firebase.database(a);
    }catch(e2){alert('연결 실패: '+e2.message);document.getElementById('startBtn').textContent='▶ 개척 시작';return;}
  }

  myName=name;myId=uid();myColor=CLS_C[myClass];
  genDecor();
  // Preload own sprite
  getSprite(myName);

  const sx=Math.floor(MW/2)*TS,sy=Math.floor(MH/2)*TS;
  myPos={x:sx,y:sy};myDir=DIR.DOWN;
  cam={x:sx-gc.width/2,y:sy-gc.height/2};
  document.getElementById('pName').textContent=CLS_I[myClass]+' '+myName;

  const myRef=db.ref('players/'+myId);
  myRef.set({name:myName,color:myColor,jobClass:myClass,x:sx,y:sy,dir:myDir,lastSeen:Date.now()});
  myRef.onDisconnect().remove();

  db.ref('players').on('value',s=>{
    players=s.val()||{};
    // Preload sprites for all players
    Object.values(players).forEach(p=>{if(p&&p.name)getSprite(p.name);});
    const cnt=Object.values(players).filter(p=>p&&Date.now()-(p.lastSeen||0)<12000).length;
    document.getElementById('oc').textContent='👥 '+cnt+'명';
  });

  db.ref('chat').limitToLast(60).on('child_added',s=>{
    const m=s.val();if(!m)return;
    addChatMsg(m);
    if(m.pid&&m.msg) bubbles[m.pid]={msg:m.msg,color:m.color,expire:Date.now()+4000};
    if(!chatOpen&&m.pid!==myId){
      unreadCount++;
      const badge=document.getElementById('chatUnread');
      badge.textContent=unreadCount>9?'9+':unreadCount;
      badge.style.display='flex';
    }
  });

  // Listen for attacks
  db.ref('events').limitToLast(1).on('child_added',s=>{
    const ev=s.val();if(!ev||ev.to!==myId||ev.type!=='attack')return;
    document.getElementById('hitFlash').style.background='rgba(255,0,0,0.3)';
    setTimeout(()=>document.getElementById('hitFlash').style.background='',200);
    const att=players[ev.from];
    if(att)notif('💥 '+att.name+'에게 공격당했다!');
  });

  document.getElementById('loginScreen').style.display='none';
  notif(CLS_I[myClass]+' '+myName+'! 황무지에 도착했다');
  loop();
}

function syncPos(){
  if(!db||!myId)return;

}

// ── Joystick ──────────────────────────────
const jWrap=document.getElementById('jWrap');
const jKnob=document.getElementById('jKnob');
const JR=44;let jTouchId=null;
jWrap.addEventListener('touchstart',e=>{
  e.preventDefault();e.stopPropagation();
  if(jTouchId!==null)return;
  const t=e.changedTouches[0];jTouchId=t.identifier;
  const r=jWrap.getBoundingClientRect();
  handleJoy(t.clientX-(r.left+r.width/2),t.clientY-(r.top+r.height/2));
},{passive:false});
jWrap.addEventListener('touchmove',e=>{
  e.preventDefault();e.stopPropagation();
  for(const t of e.changedTouches){
    if(t.identifier!==jTouchId)continue;
    const r=jWrap.getBoundingClientRect();
    handleJoy(t.clientX-(r.left+r.width/2),t.clientY-(r.top+r.height/2));
  }
},{passive:false});
function jRelease(){jTouchId=null;held.up=held.down=held.left=held.right=false;jKnob.style.transform='translate(0,0)';}
jWrap.addEventListener('touchend',e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===jTouchId)jRelease();},{passive:false});
jWrap.addEventListener('touchcancel',jRelease);
function handleJoy(dx,dy){
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<12){held.up=held.down=held.left=held.right=false;jKnob.style.transform='translate(0,0)';return;}
  const cd=Math.min(dist,JR),ang=Math.atan2(dy,dx);
  jKnob.style.transform=`translate(${Math.cos(ang)*cd}px,${Math.sin(ang)*cd}px)`;
  held.up=false;held.down=false;held.left=false;held.right=false;
  const deg=ang*(180/Math.PI);
  if(deg>=-45&&deg<45)held.right=true;
  else if(deg>=45&&deg<135)held.down=true;
  else if(deg>=-135&&deg<-45)held.up=true;
  else held.left=true;
}

// ── Action buttons ────────────────────────
function myScreenPos(){return{x:myPos.x-cam.x+TS/2,y:myPos.y-cam.y+TS/2};}
function getEntityInFront(){
  const range=TS*1.6;
  let fx=myPos.x,fy=myPos.y;
  if(myDir===DIR.UP)fy-=TS;else if(myDir===DIR.DOWN)fy+=TS;
  else if(myDir===DIR.LEFT)fx-=TS;else fx+=TS;
  let closest=null,closestDist=range;
  const now=Date.now();
  Object.entries(players).forEach(([id,p])=>{
    if(!p||id===myId)return;if(p.lastSeen&&now-p.lastSeen>12000)return;
    const d=Math.sqrt((p.x-fx)**2+(p.y-fy)**2);
    if(d<closestDist){closestDist=d;closest={...p,id};}
  });
  return closest;
}

// ── Movement ──────────────────────────────
const SPD=2.8;
function updateMove(){
  if(!myId)return;
  const spd=sprintActive?SPD*1.9:SPD;
  let dx=0,dy=0;
  if(held.up){dy=-spd;myDir=DIR.UP;}
  else if(held.down){dy=spd;myDir=DIR.DOWN;}
  else if(held.left){dx=-spd;myDir=DIR.LEFT;}
  else if(held.right){dx=spd;myDir=DIR.RIGHT;}
  if(dx!==0||dy!==0){
    walkTick++;myWalkFrame=Math.floor(walkTick/10)%2;
    myPos.x=clamp(myPos.x+dx,0,MW*TS-1);
    myPos.y=clamp(myPos.y+dy,0,MH*TS-1);
    syncPos();
  }else{myWalkFrame=0;walkTick=0;}
}
function updateCam(){
  const tx=myPos.x-gc.width/2,ty=myPos.y-gc.height/2;
  cam.x+=(tx-cam.x)*.12;cam.y+=(ty-cam.y)*.12;
  cam.x=clamp(cam.x,0,Math.max(0,MW*TS-gc.width));
  cam.y=clamp(cam.y,0,Math.max(0,MH*TS-gc.height));
}

// ── Render ────────────────────────────────
function drawWorld(){
  const sx=Math.floor(cam.x/TS),sy=Math.floor(cam.y/TS);
  const ex=Math.min(MW,sx+Math.ceil(gc.width/TS)+2);
  const ey=Math.min(MH,sy+Math.ceil(gc.height/TS)+2);
  for(let y=sy;y<ey;y++)for(let x=sx;x<ex;x++)drawGround(x,y,x*TS-cam.x,y*TS-cam.y,0);
}

function drawAllPlayers(now){
  const list=[];
  Object.entries(players).forEach(([id,p])=>{
    if(!p)return;if(id!==myId&&p.lastSeen&&now-p.lastSeen>12000)return;
    list.push({...p,id,isMe:id===myId});
  });
  const selfIdx=list.findIndex(p=>p.isMe);
  if(selfIdx>=0){list[selfIdx].x=myPos.x;list[selfIdx].y=myPos.y;list[selfIdx].dir=myDir;}
  else list.push({x:myPos.x,y:myPos.y,name:myName,color:myColor,jobClass:myClass,dir:myDir,id:myId,isMe:true});
  list.sort((a,b)=>a.y-b.y);
  list.forEach(p=>{
    const sx=p.x-cam.x,sy=p.y-cam.y;
    if(sx<-80||sy<-100||sx>gc.width+80||sy>gc.height+100)return;
    const frame=p.isMe?myWalkFrame:Math.floor(now/240+p.x*.01)%2;
    const dir=p.isMe?myDir:(p.dir||DIR.DOWN);
    drawCharacter(sx+TS/2,sy+TS/2,p.name,dir,frame,p.isMe,p.name+(p.isMe?' ★':''),p.color||'#888',p.jobClass||'warrior');
    // Bubble
    const bubble=bubbles[p.id];
    if(bubble&&now<bubble.expire){drawBubble(sx+TS/2,sy-10,bubble.msg,bubble.color||p.color);}
  });
}

// ── Main loop ─────────────────────────────
function loop(){
  const now=Date.now();
  updateMove();updateCam();
  // Sky gradient (황무지 분위기)
  const sky=ctx.createLinearGradient(0,0,0,gc.height);
  sky.addColorStop(0,'#c8a878');sky.addColorStop(1,'#e0c090');
  ctx.fillStyle=sky;ctx.fillRect(0,0,gc.width,gc.height);
  drawWorld();
  drawAllPlayers(now);
  // Vignette
  const vg=ctx.createRadialGradient(gc.width/2,gc.height/2,gc.height*.2,gc.width/2,gc.height/2,gc.height*.88);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.3)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,gc.width,gc.height);
  drawMinimap();
  updateFX();
  requestAnimationFrame(loop);
}

setInterval(()=>{if(db&&myId)db.ref('players/'+myId+'/lastSeen').set(Date.now());},4000);
